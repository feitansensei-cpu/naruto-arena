        /**
         * Résout un clash élémentaire entre deux cartes
         * Katon > Fūton > Raiton > Doton > Suiton > Katon (cycle)
         * @returns 'attack_wins', 'defense_wins', ou 'neutral'
         */
        function resolveClash(attackCard, defenseCard) {
            // ── SUIJINHEKI : bloque toutes les techniques élémentaires sauf Doton ──
            // Doton est le désavantage élémentaire de Suiton → perce le mur
            // Toutes les autres techniques élémentaires (Katon, Futon, Raiton, Suiton) sont bloquées
            // Techniques sans élément (none) → non concernées par Suijinheki
            if (defenseCard.name === 'Suiton - Suijinheki') {
                if (attackCard.element === 'none') {
                    _log('[SUIJINHEKI] Technique sans élément → non bloquée par Suijinheki');
                    return 'neutral';
                }
                if (attackCard.element === 'doton') {
                    _log('[SUIJINHEKI] Doton perce le mur d\'eau (désavantage élémentaire) → Attaque gagne');
                    return 'attack_wins';
                }
                _log('[SUIJINHEKI] Mur d\'eau bloque ' + attackCard.element.toUpperCase());
                return 'defense_wins';
            }

            // ── HAKKESHÔ KAITEN : bloque absolument tout sauf Yasogami Kûgeki ──
            // Rotation défensive absolue — ne dépend pas des éléments
            if (defenseCard.name === 'Hakkeshô Kaiten') {
                if (attackCard.name === 'Yasogami Kûgeki') {
                    _log('[HAKKESHÔ KAITEN] Yasogami Kûgeki perce la rotation → Attaque gagne');
                    return 'attack_wins';
                }
                _log('[HAKKESHÔ KAITEN] Rotation défensive bloque ' + attackCard.name);
                return 'defense_wins';
            }

            // Avantages élémentaires (attaque domine défense)
            const advantages = {
                katon: 'futon',
                futon: 'raiton',
                raiton: 'doton',
                doton: 'suiton',
                suiton: 'katon'
            };
            
            // Vérifier si l'attaque a l'avantage
            if (advantages[attackCard.element] === defenseCard.element) {
                _log(`[CLASH] ${attackCard.element.toUpperCase()} > ${defenseCard.element.toUpperCase()} → Attaque gagne`);
                return 'attack_wins';
            }
            
            // Vérifier si la défense a l'avantage
            if (advantages[defenseCard.element] === attackCard.element) {
                _log(`[CLASH] ${defenseCard.element.toUpperCase()} > ${attackCard.element.toUpperCase()} → Défense gagne`);
                return 'defense_wins';
            }
            
            // Pas d'avantage ou éléments identiques
            _log(`[CLASH] ${attackCard.element} vs ${defenseCard.element} → Neutre`);
            return 'neutral';
        }
        
        window.selectCardAction = async (cardIdx, action) => {
            // Bloquer le poll pendant toute action locale pour éviter l'écrasement de la main
            setActionInProgress(true);
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
            // Helper local : libère actionInProgress avant tout return
            const _release = () => { setActionInProgress(false); if (!pollInterval && gameState.roomCode) startPolling(gameState.roomCode); };
            const myPlayer = gameState.arenaState.players.find(p => p.name === gameState.playerName);
            let card = myPlayer.hand[cardIdx];
            _log('[SELECTACTION] card:', card?.name, '| action:', action, '| isUtility check...');

            // KOTOAMATSUKAMI : NE PAS résoudre la vraie carte ici
            // Praw doit voir et interagir avec la fausse carte (popup, boutons, GIF)
            // La vraie carte sera résolue dans executeAttack pour les effets réels
            
            // Remove popup
            document.querySelector('[data-popup]')?.remove();
            
            // BUGFIX 5: Vérifier PRISON AQUEUSE (ne peut jouer de carte)
            if (myPlayer.prisonAqueuse && action !== 'discard' && action !== 'counter') {
                _release(); return naAlert(`❌ PRISON AQUEUSE !\n\nVous ne pouvez pas jouer de carte.\nVous pouvez seulement piocher.\n\nLibération si ${myPlayer.prisonAqueuseSource} est attaqué.`);
            }
            
            if (action === 'discard') {
                // CORRECTION V4: Vérifier qu'on n'a pas déjà défaussé ce tour
                if (myPlayer.hasDiscardedThisTurn) {
                    _release(); return naAlert(`❌ DÉFAUSSE LIMITÉE !\n\nVous avez déjà défaussé une carte ce tour.\n\nMaximum: 1 carte défaussée par tour.`);
                }
                
                if (cardIdx >= 0) myPlayer.hand.splice(cardIdx, 1); // skip si Edo Tensei override
                myPlayer.hasDiscardedThisTurn = true;
                
                await saveGame();
                render();
                _release(); return;
            }
            
            // CORRECTION 2: Gérer action UTILISER
            if (action === 'use') {
                _log('[SELECTACTION] → USE branch | card:', card.name);
                // CORRECTION V7: Vérifier que c'est notre tour pour UTILISER
                const currentPlayer = gameState.arenaState.players[gameState.arenaState.currentTurn % gameState.arenaState.players.length];
                const isMyTurn = currentPlayer.name === gameState.playerName;
                
                // Cartes autorisées hors-tour (réactives / passives)
                const _outOfTurnAllowed = [
                    'Katon', 'Suiton', 'Doton', 'Raiton', 'Futon', // Chakras élémentaires
                    'Kamui [O]', 'Kamui [K]',                         // Kamui
                    'Kotoamatsukami',                                 // Kotoamatsukami
                    'Kirigakure no Jutsu',                            // Brouillard
                    'Mangekyo Sharingan (Obito/Kakashi)',
                    'Mangekyo Sharingan (Itachi)',
                    'Mangekyo Sharingan (Sasuke)',
                    'Mangekyo Sharingan (Shisui)',                    // Mangekyo
                    'Byakugan',                                       // Byakugan
                    'Vision 360',                                     // Vision 360
                    'Fûnyû no Jutsu', 'Funyu no Jutsu',              // Fûnyû
                    'Switch Element',                                 // Switch Element
                ];
                if (!isMyTurn && !_outOfTurnAllowed.includes(card.name)) {
                    _release(); return naAlert(`❌ Ce n'est pas votre tour !\n\nVous ne pouvez pas utiliser de cartes pendant le tour d'un adversaire.\n\nSeul le bouton CONTRE est disponible hors de votre tour.`);
                }
                
                const isDojutsu = ['Byakugan', 'Mangekyo Sharingan (Obito/Kakashi)', 'Mangekyo Sharingan (Itachi)', 'Mangekyo Sharingan (Sasuke)', 'Mangekyo Sharingan (Shisui)'].includes(card.name);
                const isNatureCard = ['Katon', 'Suiton', 'Doton', 'Raiton', 'Futon'].includes(card.name);
                
                // CORRECTION V6: Définir isSelfTarget ici pour éviter erreur
                const isSelfTarget = card.target === 'self' || ['Fûnyû no Jutsu', 'Reverse Jutsu', 'Kirigakure no Jutsu', 'Kamui [O]', 'Kagatsuchi', 'Kai', 'Sōten Kaihō', 'Sharingan', 'Taijutsu', 'Ouverture de la Première Porte', 'Switch Element', 'Katon - Kasumi Enbon No Jutsu'].includes(card.name);
                
                // CORRECTION 2A: Activer Dojutsu
                if (isDojutsu) {
                    if (myPlayer.dojutsu !== null && myPlayer.dojutsu !== undefined) {
                        _release(); return naAlert('Slot Dojutsu occupe ! Vous possedez deja : ' + myPlayer.dojutsu);
                    }
                    
                    _log('[DOJUTSU] 🟡 Début activation:', card.name);
                    _log('[DOJUTSU] dojutsu avant:', myPlayer.dojutsu, '| hand length:', myPlayer.hand.length, '| cardIdx:', cardIdx);
                    
                    // Bloquer tout poll pendant toute l'opération
                    setActionInProgress(true);
                    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
                    _log('[DOJUTSU] 🔒 actionInProgress=true, poll stoppé');
                    
                    // Afficher le GIF d activation
                    await showClashEvent({ type: 'attack', attacker: myPlayer.name, name: card.name, gif: card.gif });
                    _log('[DOJUTSU] 🎬 GIF terminé');
                    
                    myPlayer.dojutsu = card.name;
                    // MANGEKYO SHARINGAN annule le Genjutsu actif
                    const _isMangekyo = card.name.startsWith('Mangekyo Sharingan');
                    if (_isMangekyo && myPlayer.cannotDraw) {
                        myPlayer.cannotDraw = false;
                        myPlayer.cannotDrawTurns = 0;
                        _log('[MANGEKYO] Genjutsu annulé par activation du Mangekyo Sharingan');
                    }
                    // Si sous Kotoamatsukami et carte masquée → marquer le dojutsu comme fictif
                    if (myPlayer.kotoamatsukamiActive && card._kotoa_masked === true) {
                        myPlayer.kotoaFakeDojutsu = card.name;
                        _log('[KOTOA DOJUTSU] Dojutsu fictif marqué:', card.name);
                    }
                    myPlayer.hand.splice(cardIdx, 1);
                    // Passer en phase action pour débloquer Fin de tour
                    if (gameState.arenaState.turnPhase === 'draw') {
                        gameState.arenaState.turnPhase = 'action';
                    }
                    _log('[DOJUTSU] ✅ dojutsu set:', myPlayer.dojutsu, '| hand length après splice:', myPlayer.hand.length);
                    _log('[DOJUTSU] turnPhase après fix:', gameState.arenaState.turnPhase);
                    
                    await saveGame();
                    _log('[DOJUTSU] 💾 saveGame OK - _savedAt:', gameState._savedAt);
                    
                    // Nettoyer tout overlay résiduel avant render
                    document.querySelectorAll('.clash-event-overlay').forEach(el => { _log('[DOJUTSU] 🧹 Overlay résiduel supprimé'); el.remove(); });
                    document.querySelectorAll('[data-popup]').forEach(el => el.remove());
                    
                    render();
                    _log('[DOJUTSU] 🖥 render OK - dojutsu:', gameState.arenaState.players.find(p=>p.name===gameState.playerName)?.dojutsu);
                    _log('[DOJUTSU] 🔍 Overlays dans DOM après render:', document.querySelectorAll('.clash-event-overlay').length);
                    
                    // Relancer le poll après confirmation Supabase
                    startPolling(gameState.roomCode);
                    _log('[DOJUTSU] ▶️ poll relancé');
                    // Libérer le verrou après que le premier poll a eu lieu
                    setTimeout(function() { 
                        setActionInProgress(false); 
                        _log('[DOJUTSU] 🔓 actionInProgress=false');
                    }, 3000);
                    _release(); return;
                }
                
                // CORRECTION 2B: Activer 2ème Nature
                else if (isNatureCard) {
                    const natureName = card.name.toLowerCase();
                    
                    if (myPlayer.chakraNatures.includes(natureName)) {
                        _release(); return naAlert(`❌ Vous maîtrisez déjà ${card.name} !`);
                    }
                    
                    if (myPlayer.chakraNatures.length >= 2) {
                        _release(); return naAlert(`❌ Maximum 2 natures !\n\nVous maîtrisez déjà : ${myPlayer.chakraNatures.map(n => n.toUpperCase()).join(' + ')}`);
                    }
                    
                    myPlayer.chakraNatures.push(natureName);
                    // Si sous Kotoamatsukami, marquer cette nature comme fictive
                    if (myPlayer.kotoamatsukamiActive) {
                        if (!myPlayer.kotoaFakeNatures) myPlayer.kotoaFakeNatures = [];
                        myPlayer.kotoaFakeNatures.push(natureName);
                        _log('[KOTOA NATURE] Nature fictive ajoutée:', natureName);
                    }
                    myPlayer.hand.splice(cardIdx, 1);
                    if (gameState.arenaState.turnPhase === 'draw') gameState.arenaState.turnPhase = 'action';
                    
                    _log(`[NATURE] ${myPlayer.name} ajoute ${natureName}`);
                    
                    await saveGame();
                    render();
                    
                }
                
                // CORRECTION 2C: Techniques de contrôle (Kirigakure, Edo Tensei, etc.)
                else {
                    // CORRECTION V3: Vérifier si technique SELF ou nécessite cible
                    if (isSelfTarget) {
                        // Techniques SELF: afficher GIF avant activation
                        if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
                        await showClashEvent({ type: 'attack', attacker: myPlayer.name, name: card.name, gif: card.gif });
                        
                        // Techniques SELF: activation immédiate sans sélection
                        if (card.name === 'Fûnyû no Jutsu') {
                            myPlayer.funyuActive = true;
                            myPlayer.funyuTurns = 3;
                            myPlayer.funyuStoredElement = null;
                            myPlayer.hand.splice(cardIdx, 1);
                            
                            _log(`[FÛNYÛ] ${myPlayer.name} active Fûnyû no Jutsu pendant 3 tours`);
                            
                            await saveGame();
                            render();
                            
                        }
                        else if (card.name === 'Doton - Kôka Jutsu') {
                            myPlayer.damageReduction = 3;
                            myPlayer.damageReductionTurns = 3;
                            myPlayer._dmgRedActivatedTurn = gameState.arenaState.currentTurn;
                            myPlayer.hand.splice(cardIdx, 1);
                            
                            _log(`[KÔKA JUTSU] ${myPlayer.name} réduit dégâts de -3 pendant 3 tours`);
                            
                            await saveGame();
                            render();
                            
                        }
                        else if (card.name === 'Chidori Nagashi') {
                            // CORRECTION V11: Chidori Nagashi - Réduction dégâts -2
                            myPlayer.damageReduction = 2;
                            // CORRECTION V12: Duration = 2 tours de décompte pour 1 tour effectif
                            // Car le décompte se fait dès la fin du tour d'activation
                            myPlayer.damageReductionTurns = 2;
                            myPlayer.chidoriActive = true;
                            
                            // CORRECTION V12: Décrémenter uses au lieu de supprimer
                            if (card.uses && parseInt(card.uses) > 1) {
                                card.uses = (parseInt(card.uses) - 1).toString();

            if (!element || element === 'none') return;

            let card = document.querySelector('[data-opp-card="' + targetName + '"]');

            if (!card && hpEl) {
                card = hpEl.closest('[style*="background"]') || hpEl.parentElement?.parentElement;
                // Assurer que la case a position:relative pour les particules absolues
                if (card) { card.style.position = 'relative'; card.style.overflow = 'hidden'; }

                    ostLoadAndPlay();
                });
            }
        });

        // ── Fermeture robuste des na-overlay : MutationObserver + Échap ──────────────
        // Pour chaque nouvelle na-overlay créée dans le DOM, on ajoute directement
        // un onclick sur le fond (pas sur les enfants → ciblage précis via e.target === element)
        (function() {
            function bindOverlayClose(el) {
                if (el._overlayBound) return;
                el._overlayBound = true;
                el.addEventListener('click', function(e) {
                    if (e.target !== el) return; // clic sur le fond uniquement
                    // Préférer le bouton ghost/annuler pour un rendu propre
                    const cancelBtn = el.querySelector('.na-btn-ghost');
                    if (cancelBtn) { cancelBtn.click(); return; }
                    // Sinon fermer directement
                    el.remove();
                });
            }
            const obs = new MutationObserver(mutations => {
                for (const m of mutations) {
                    for (const node of m.addedNodes) {
                        if (node.nodeType !== 1) continue;
                        if (node.classList && node.classList.contains('na-overlay')) bindOverlayClose(node);
                        node.querySelectorAll && node.querySelectorAll('.na-overlay').forEach(bindOverlayClose);
                    }
                }
            });
            obs.observe(document.body || document.documentElement, { childList: true, subtree: true });
        })();

        // ── Watchdog anti-écran-noir : nettoie les clash-event-overlay vraiment orphelins ──
        // Un overlay est "orphelin" s'il traîne depuis plus de 8s (timestamp à la création)
        setInterval(() => {
            const now = Date.now();
            const stale = document.querySelectorAll('.clash-event-overlay');
            stale.forEach(el => {
                const created = parseInt(el.dataset.createdAt || '0');
                if (created && (now - created) > 8000) {
                    _warn('[WATCHDOG] clash-event-overlay orphelin (' + Math.round((now-created)/1000) + 's) → nettoyage forcé');
                    el.remove();
                }
            });
        }, 2000);
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const overlays = document.querySelectorAll('.na-overlay');
                if (overlays.length > 0) {
                    const last = overlays[overlays.length - 1];
                    const cancelBtn = last.querySelector('.na-btn-ghost');
                    if (cancelBtn) cancelBtn.click();
                    else last.remove();
                }
            }
        });

        window.ostUpdate = function() {
            const audio = document.getElementById('naruto-ost');
            if (!audio) return;
            const inGame = (typeof gameState !== 'undefined' && gameState.screen === 'arena-game');
            if (inGame) {
                if (audio.paused && window._ostReady) {
                    if (!audio.src || audio.src === window.location.href) {
                        ostLoadAndPlay(); // Première lecture : charger une piste
                    } else {
                        audio.volume = window._ostVolume;
                        audio.play().catch(() => {});
                    }
                }
            } else {
                if (!audio.paused) {
                    audio.pause();
                    audio.currentTime = 0;
                    audio.src = ''; // Reset pour repartir sur une piste aléatoire la prochaine fois
                    _ostCurrentIdx = -1;
                }
            }
            // Sync icône mute
            const icon = document.getElementById('ost-icon');
            if (icon) icon.textContent = (audio.muted || audio.paused) ? '🔇' : '🎵';
        };

        // Démarrer au premier clic (contrainte navigateur)
        document.addEventListener('click', function tryOst() {
            window._ostReady = true;
            window.ostUpdate();
        }, { once: true });
        window.ostChangeVolume = function(delta) {
            const audio = document.getElementById('naruto-ost');
            if (!audio) return;
            window._ostVolume = Math.min(1, Math.max(0, window._ostVolume + delta));
            audio.volume = window._ostVolume;
            if (window._ostVolume === 0) { audio.muted = true; }
            else { audio.muted = false; }
            const muteBtn = document.getElementById('ost-overlay-btn');
            if (muteBtn) muteBtn.textContent = audio.muted ? '🔇' : '🎵';
            const volFill = document.getElementById('ost-vol-fill');
            if (volFill) volFill.style.width = (window._ostVolume * 100) + '%';
            _log('[OST] Volume:', Math.round(window._ostVolume * 100) + '%');
        };
    
    // ── LOTUS DRAW MODAL ──
    window._lotusDrawState = { drawnCard: null, selectedIdx: null, onResolve: null };

    function openLotusDrawModal(drawnCard, playerHand, onResolve) {
        const modal = document.getElementById('lotus-draw-modal');
        // Carte piochée : nom + gif + description
        document.getElementById('ldm-card-name').textContent = drawnCard.name;
        document.getElementById('ldm-card-desc').textContent = drawnCard.description || '';
        const drawnGif = document.getElementById('ldm-drawn-gif');
        drawnGif.src = drawnCard.gif || '';
        drawnGif.style.display = drawnCard.gif ? 'block' : 'none';
        // Afficher le label défausse seulement si main pleine
        document.getElementById('ldm-discard-label').style.display = playerHand.length >= 7 ? 'block' : 'none';
        // Construire la grille des cartes de la main
        const handList = document.getElementById('ldm-hand-list');
        handList.innerHTML = '';
        handList.style.display = playerHand.length >= 7 ? 'grid' : 'none';
        playerHand.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = 'ldm-hand-card';
            btn.innerHTML = (c.gif ? `<img class="lhc-gif" src="${c.gif}" alt="">` : '') +
                `<div class="lhc-name">${c.name}</div>` +
                `<div class="lhc-rarity">${c.rarity ? 'Rareté ' + c.rarity : ''}</div>`;
            btn.onclick = () => {
                document.querySelectorAll('.ldm-hand-card').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                window._lotusDrawState.selectedIdx = i;
                document.getElementById('ldm-btn-keep').classList.add('ready');
            };
            handList.appendChild(btn);
        });
        window._lotusDrawState = { drawnCard, playerHand, selectedIdx: null, onResolve };
        document.getElementById('ldm-btn-keep').classList.remove('ready');
        // Si main pas pleine, garder est immédiatement dispo
        if (playerHand.length < 7) document.getElementById('ldm-btn-keep').classList.add('ready');
        modal.classList.add('active');
    }

    function lotusDrawConfirmKeep() {
        const s = window._lotusDrawState;
        if (s.selectedIdx === null) return;
        // Modifier directement la main du joueur dans le gameState
        const myP = gameState.arenaState.players.find(p => p.name === gameState.playerName);
        if (!myP) return;
        const discarded = myP.hand.splice(s.selectedIdx, 1)[0];
        myP.hand.push(s.drawnCard);
        document.getElementById('lotus-draw-modal').classList.remove('active');
        _log('[LOTUS DRAW] Garde : ' + s.drawnCard.name + ' | Défausse : ' + discarded.name);
        if (s.onResolve) s.onResolve({ kept: true, drawn: s.drawnCard, discarded });
    }

    function lotusDrawConfirmReject() {
        const s = window._lotusDrawState;
        document.getElementById('lotus-draw-modal').classList.remove('active');
        _log('[LOTUS DRAW] Rejette : ' + s.drawnCard.name);
        if (s.onResolve) s.onResolve({ kept: false, drawn: s.drawnCard, discarded: null });
        saveGame();
    }


    // ── HELPER : bandeau effet actif ──────────────────────────────────────────
    function _bandeau(opts) {
        var pos = opts.position || 'top';
        var offset = opts.offset || 0;
        var posStyle = pos === 'top' ? 'top:' + offset + 'px' : 'bottom:' + offset + 'px';
        var accentSide = pos === 'top' ? 'border-bottom' : 'border-top';
        // Bordure colorée subtile sur le côté visible (bas si top, haut si bottom)
        var accentBorder = accentSide + ':1px solid ' + (opts.accentColor || 'rgba(255,255,255,0.06)') + ';';
        // Bordure discrète sur le côté opposé
        var oppSide = pos === 'top' ? 'border-top' : 'border-bottom';
        var oppBorder = oppSide + ':1px solid rgba(255,255,255,0.03);';
        // Dot coloré
        var dot = '<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:' + (opts.dotColor||'rgba(255,255,255,0.35)') + ';margin-right:10px;flex-shrink:0"></span>';
        // Nom
        var label = '<span style="font-family:Georgia,serif;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:' + (opts.color||'rgba(255,255,255,0.7)') + '">' + opts.label + '</span>';
        // Séparateur
        var sep = (opts.sub || opts.turns !== undefined) ? '<span style="display:inline-block;width:1px;height:10px;background:rgba(255,255,255,0.08);margin:0 10px;flex-shrink:0"></span>' : '';
        // Sous-titre
        var sub = opts.sub ? '<span style="font-family:Georgia,serif;font-size:' + (opts.subSize||'8px') + ';letter-spacing:1px;color:' + (opts.subColor||'rgba(255,255,255,0.28)') + '">' + opts.sub + '</span>' : '';
        // Tours
        var turns = opts.turns !== undefined
            ? '<span style="font-family:Georgia,serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:' + (opts.dotColor || 'rgba(255,255,255,0.8)') + '">' + opts.turns + ' tour' + (opts.turns > 1 ? 's' : '') + '</span>'
            : '';
        var subPart = sub + (sub && turns ? '<span style="margin:0 6px;color:rgba(255,255,255,0.08)">·</span>' : '') + turns;
        return '<div style="position:fixed;' + posStyle + ';left:0;right:0;z-index:' + (opts.zIndex||999) + ';'
            + 'background:' + (opts.bg || 'rgba(4,4,14,0.9)') + ';'
            + 'backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);'
            + accentBorder + oppBorder
            + 'display:flex;align-items:center;justify-content:center;'
            + 'height:24px;pointer-events:none;">'
            + dot + label + sep + subPart
            + '</div>';
    }


    // ── SWITCH ELEMENT ────────────────────────────────────────────────────────
    const _swElemColors = {
        katon:  { dot:'rgba(239,68,68,0.75)',  label:'#f87171', name:'Katon'  },
        futon:  { dot:'rgba(74,222,128,0.75)', label:'#86efac', name:'Fûton'  },
        suiton: { dot:'rgba(59,130,246,0.75)', label:'#93c5fd', name:'Suiton' },
        doton:  { dot:'rgba(161,140,100,0.75)',label:'#d4b483', name:'Doton'  },
        raiton: { dot:'rgba(234,179,8,0.75)',  label:'#fde047', name:'Raiton' },
    };

    function openSwitchElementModal(natures) {
        document.querySelectorAll('.sw-elem-overlay').forEach(e => e.remove());
        const overlay = document.createElement('div');
        overlay.className = 'na-overlay sw-elem-overlay';

        const btns = natures.map((n, i) => {
            const col = _swElemColors[n] || { dot:'rgba(255,255,255,0.4)', label:'#e5e7eb', name: n };
            return `<button onclick="switchElementApply('${n}')" style="
                width:100%; padding:13px 16px; border-radius:10px; margin-bottom:8px;
                background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
                display:flex; align-items:center; gap:12px; cursor:pointer;
                transition:all 0.15s; font-family:Georgia,serif; text-align:left;"
                onmouseover="this.style.background='rgba(255,255,255,0.07)';this.style.borderColor='rgba(255,255,255,0.15)'"
                onmouseout="this.style.background='rgba(255,255,255,0.03)';this.style.borderColor='rgba(255,255,255,0.07)'">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col.dot};flex-shrink:0"></span>
                <span style="font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${col.label}">${col.name}</span>
                <span style="margin-left:auto;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:1px">SACRIFIER</span>
            </button>`;
        }).join('');

        overlay.innerHTML = `
            <div class="na-card" style="max-width:380px">
                <div class="na-card-accent" style="background:linear-gradient(90deg,rgba(251,191,36,0.6),rgba(234,88,12,0.4))"></div>
                <div style="padding:0 0 4px">
                    <p class="na-title" style="margin-bottom:4px">Switch Element</p>
                    <div class="na-sep"></div>
                    <p class="na-sub" style="margin-bottom:18px">Sélectionne le chakra de nature à <strong>sacrifier</strong>.<br>Il sera remplacé aléatoirement.</p>
                    ${btns}
                    <button onclick="this.closest('.na-overlay').remove()" class="na-btn na-btn-ghost" style="margin-top:4px">Annuler</button>
                </div>
            </div>`;
        document.body.appendChild(overlay);
    }

    window.switchElementApply = async function(oldNature) {
        document.querySelectorAll('.sw-elem-overlay').forEach(e => e.remove());
        const myPlayer = gameState.arenaState.players.find(p => p.name === gameState.playerName);
        if (!myPlayer) return;

        const idx = (myPlayer.chakraNatures || []).indexOf(oldNature);
        if (idx === -1) return;
        myPlayer.chakraNatures.splice(idx, 1);

        const allNatures = ['katon', 'futon', 'suiton', 'doton', 'raiton'];
        const available = allNatures.filter(n => n !== oldNature);
        const newNature = available[Math.floor(Math.random() * available.length)];
        myPlayer.chakraNatures.push(newNature);

        const oldLabel = (_swElemColors[oldNature] || {}).name || oldNature;
        const newLabel = (_swElemColors[newNature] || {}).name || newNature;

        await saveGame(); render();

        // Popup résultat élégant (pas de showClashEvent — pas de GIF animé pour cette carte)
        setTimeout(() => {
            const oldCol = _swElemColors[oldNature] || { dot:'rgba(255,255,255,0.4)', label:'#e5e7eb', name: oldLabel };
            const newCol = _swElemColors[newNature] || { dot:'rgba(255,255,255,0.4)', label:'#e5e7eb', name: newLabel };
            const popup = document.createElement('div');
            popup.className = 'na-overlay';
            popup.innerHTML = `
                <div class="na-card" style="max-width:340px;text-align:center">
                    <div class="na-card-accent" style="background:linear-gradient(90deg,rgba(251,191,36,0.5),rgba(234,88,12,0.35))"></div>
                    <p class="na-title" style="margin-bottom:4px">Switch Element</p>
                    <div class="na-sep"></div>
                    <p class="na-sub" style="margin-bottom:20px">Transformation du chakra accomplie</p>
                    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:24px">
                        <div style="text-align:center">
                            <div style="width:10px;height:10px;border-radius:50%;background:${oldCol.dot};margin:0 auto 6px"></div>
                            <span style="font-family:Georgia,serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${oldCol.label};text-decoration:line-through;opacity:0.5">${oldLabel}</span>
                        </div>
                        <span style="font-size:18px;color:rgba(255,255,255,0.2)">→</span>
                        <div style="text-align:center">
                            <div style="width:10px;height:10px;border-radius:50%;background:${newCol.dot};margin:0 auto 6px;box-shadow:0 0 8px ${newCol.dot}"></div>
                            <span style="font-family:Georgia,serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${newCol.label}">${newLabel}</span>
                        </div>
                    </div>
                    <button onclick="this.closest('.na-overlay').remove()" class="na-btn na-btn-ghost">Continuer</button>
                </div>`;
            document.body.appendChild(popup);
        }, 150);
    };

</script>
    
    <!-- MODAL LOTUS DRAW -->
    <div id="lotus-draw-modal">
        <div class="ldm-box">
            <div class="ldm-accent"></div>
            <div class="ldm-inner">
                <p class="ldm-title">✦ Carte Piochée</p>
                <p class="ldm-sub">Main pleine — que fais-tu de cette carte ?</p>
                <div class="ldm-drawn">
                    <img id="ldm-drawn-gif" src="" alt="">
                    <div class="ldm-drawn-info">
                        <div class="ldm-drawn-name" id="ldm-card-name">—</div>
                        <div class="ldm-drawn-desc" id="ldm-card-desc">—</div>
                    </div>
                </div>
                <p class="ldm-discard-label" id="ldm-discard-label" style="display:none">↓ Sélectionne une carte à défausser</p>
            </div>
            <div class="ldm-hand" id="ldm-hand-list"></div>
            <div class="ldm-btns">
                <button class="ldm-btn-keep" id="ldm-btn-keep" onclick="lotusDrawConfirmKeep()">✓ Garder</button>
                <button class="ldm-btn-reject" onclick="lotusDrawConfirmReject()">✕ Rejeter</button>
            </div>
        </div>
    </div>

</body>

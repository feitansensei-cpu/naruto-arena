scription": "[Mode Contre Only]\\n\\nDéfausse entièrement la main de l'assaillant.\\n\\nDe plus, en fonction de ce que l'assaillant possède dans sa main avant la défausse, vous pouvez lui infliger un certain nombre de dégâts :\\n\\n- Dojutsu : -1HP (cumulable)\\n- Techniques Dojutsus : -1HP (cumulable)\\n- Sharingan : -1HP (cumulable)","requiredDojutsu": "Mangekyo Sharingan (Obito/Kakashi)"},{"name": "Amaterasu","type": "special","target": "single","element": "none","rarity": "S","copies": 1,"damage": 8,"uses": "1","duration": "1","gif": "https://i.imgur.com/5lXyEsK.gif","description": "Vous infligez 8 de dégâts à l'adversaire ciblé. \n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Itachi) ou le Mangekyo Sharingan (Sasuke)."},{"name": "Tsukuyomi","type": "special","target": "single","element": "none","rarity": "S","copies": 1,"damage": 0,"uses": "1","duration": "4","gif": "https://i.imgur.com/VKC8Rhm.gif","description": "Votre adversaire ciblé perd 1 HP à chaque tour pendant 5 tours. De plus, vous avez la vision sur sa main (cartes dévoilées) pendant 5 tours.\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Itachi)."},{"name": "Kagatsuchi","type": "special","target": "self","element": "none","rarity": "A","copies": 1,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/q0ix6nZ.gif","description": "Cette carte \"Kagatsuchi\" doit être combiné avec la carte \"Amaterasu\". Une fois les deux cartes combinées, le \"Amaterasu\" ne touche pas qu'une seule cible (mono-cible) mais tous les adversaires de l'arène (AOE-All).\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Sasuke)."},{"name": "Kotoamatsukami","type": "special","target": "single","element": "none","rarity": "S","copies": 1,"damage": 0,"uses": "1","duration": "5","gif": "https://i.imgur.com/ItpkTsV.gif","description": "Votre adversaire ne peut plus piocher pendant 3 tours. De plus, force l'adversaire ciblé à attaquer (s'il possède une technique capable d'être lancée) un autre adversaire de votre choix.\n\nTant que l'adversaire est sous l'emprise du Kotoamatsukami, vous pouvez utiliser ses cartes offensives ou défensives.\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Shisui)."},{"name": "Vision 360","type": "special","target": "single","element": "none","rarity": "C","copies": 4,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/UtK6qIk.gif","description": "• Effet Mono-Cible : vous pouvez voir une carte de la main de l'adversaire ciblé.\n\n• Effet AOE : Vous pouvez voir toutes les cartes de main \"Genjutsu\" de tous vos adversaires"},{"name": "Jûken","type": "offensive","target": "single","element": "none","rarity": "B","copies": 3,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/0GaETPk.gif","description": "Aléatoirement, vous réalisez un des techniques suivantes :\n\n• 16 Poings du Hakke : 1 de dégât \n• 32 Poings du Hakke : 2 de dégâts \n• 64 Poings du Hakke : 3 de dégâts \n• 128 Poings du Hakke : 4 de dégâts"},{"name": "Hakkeshô Kaiten","type": "defensive","target": "self","element": "none","rarity": "A","copies": 2,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/9V3YcPI.gif","description": "[Mode Contre Only] :\n\nTechnique qui se déclenche automatiquement contre les attaques adverses à votre encontre, et qui les annule. Cette technique annule toutes les techniques offensives élémentaires et dojutsus.\n\nDe plus, l'adversaire à l'origine de l'attaque perd 2 HP."},{"name": "Yasogami Kûgeki","type": "offensive","target": "multi-2","element": "none","rarity": "S","copies": 1,"damage": 7,"uses": "1","duration": "1","gif": "https://i.imgur.com/HI2uTmr.png","description": "Cette technique possède la particularité de ne pas pouvoir être contré/bloqué par aucune autre technique (même en contre défensif) sauf à l'exception de Kamui (insensibilité aux dégâts), et potentiellement le Kotoamatsukami (selon le contexte)"},{"name": "Edo Tensei","type": "special","target": "self","element": "none","rarity": "S","copies": 1,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/dgdBchY.gif","description": "Cette technique permet de ranimer un personnage de son choix parmi la liste suivante (un tour uniquement) : \n\n• Sarutobi Hiruzen\n• Uchiwa Obito\n• Uchiwa Sasuke\n• Uchiwa Itachi\n• Uchiwa Shisui\n• Uchiwa Obito\n• Hyûga Neji\n• Ōtsutsuki Kaguya \n\nUne fois le personnage invoqué, vous pourrez utiliser aléatoirement une des techniques affiliées à son dojutsu (soit tout le monde sauf Hiruzen Sarutobi). \n\nSi la technique utilisée est un dojutsu qui nécessite de cibler un adversaire, et bien vous ciblez l'adversaire de votre choix.\n\nDans le cas de Obito Uchiwa, si Kamui s'active, Obito vous protégera des techniques adverses pendant 3 tours.\n\nQuant à Sarutobi Hiruzen, si vous l'invoquez, vous pouvez choisir une nature de chakra parmi les cinq éléments de base, et une technique affiliée à cet élément de chakra sera utilisé de façon aléatoire sur l'adversaire de votre choix.\n\n[ATTENTION] : Cette technique vous enlève 1 HP à chaque tour pendant le restant de la partie."},{"name": "Reverse Jutsu","type": "special","target": "self","element": "none","rarity": "A","copies": 3,"damage": 0,"uses": "1","duration": "5","gif": "https://i.imgur.com/rQ9LcRU.jpeg","description": "Permet de sacrifier une carte technique élémentaire de votre main pour créer une nouvelle carte technique élémentaire de votre choix parmi toutes les cartes existantes dans le jeu. Vous obtiendrez votre carte seulement après la fin de la durée active (5 tours).\n\nAttention, la carte sacrifiée et la carte crée doivent avoir la même rareté."},{"name": "Kirigakure no Jutsu","type": "special","target": "self","element": "suiton","rarity": "B","copies": 4,"damage": 0,"uses": "1","duration": "2","gif": "https://i.imgur.com/uIewbXK.gif","description": "Tant que la brume est active, vous êtes immunisés contre :\n\n- Genjutsu\n- Tsukuyomi\n- Kotoamatsukami\n- Vision 360\n- Vision (pouvoir)\n- Shiki Fūjin\n- Scellement du chakra élémentaire\n- Destruction de Carte\n- Switch Rumble\n- Sharingan (mais seulement pour les techniques que vous utilisez au sein de votre brume, donc les techniques défensives par exemple)"},{"name": "Kaze no Yaiba","type": "offensive","target": "single","element": "futon","rarity": "B","copies": 5,"damage": 2,"uses": "2","duration": "1","gif": "https://i.imgur.com/IqSMFhM.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Shinkû Renpa","type": "offensive","target": "multi-2","element": "futon","rarity": "B","copies": 4,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/tMLiIhl.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Katon - Gôryûka no jutsu","type": "offensive","target": "multi-2","element": "katon","rarity": "A","copies": 3,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/FUNeepD.gif","description": "Si cette technique entre en collision avec une technique SUITON, la technique perd automatiquement. La technique Suiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Doton - Domu","type": "offensive","target": "single","element": "doton","rarity": "B","copies": 4,"damage": 2,"uses": "2","duration": "1","gif": "https://i.imgur.com/URtX3sG.gif","description": "Si cette technique entre en collision avec une technique RAITON, la technique perd automatiquement (annulation). La technique Raiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Genjutsu","type": "special","target": "single","element": "none","rarity": "B","copies": 4,"damage": 0,"uses": "1","duration": "2","gif": "https://i.imgur.com/huxeWc3.gif","description": "Empêche l'adversaire de votre choix de piocher une carte pendant deux tours."},{"name": "Shiki Fûjin","type": "special","target": "single","element": "none","rarity": "A","copies": 1,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/HePlZJx.gif","description": "Lorsque vous activez Shiki Fûjin, pendant 3 tours, le Shinigami reste actif à vos côtés.\n\nMode Contre (uniquement) : \n\n● Si vous réalisez une contre-attaque face à une technique du type élémentaire, vous pouvez extraire et détruire sur le joueur qui vous a attaqué, une nature de chakra élémentaire au choix\n\n● Si vous réalisez une contre-attaque face à une technique du type dojutsu (Amaterasu, Tsukuyomi, Juken, Yasogami Kûgeki), vous pouvez extraire et détruire sur le joueur qui vous a attaqué, son dojutsu.\n\n● Si vous réalisez une contre-attaque face à une attaque provenant d'une arme, vous pouvez extraire et détruire sur le joueur qui vous a attaqué, son arme."},{"name": "Kirin","type": "offensive","target": "aoe-all","element": "raiton","rarity": "A","copies": 2,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/fd2Li4w.gif","description": "Si cette technique entre en collision avec une technique Futon, la technique perd automatiquement. La technique Futon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Fûnyû no Jutsu","type": "special","target": "self","element": "none","rarity": "A","copies": 3,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/PcyLX0e.gif","description": "Si vous activez le Fûnyû no Jutsu, et que pendant la durée active (3 tours), vous encaissez des dégâts d'une attaque élémentaire ennemie, alors vous pourrez ensuite (à la fin de la durée active) obtenir la carte élémentaire utilisée par l'adversaire contre vous.\n\nSi vous avez déjà 7 cartes dans votre main, vous en défaussez une, et vous récupérez votre nouvelle carte.\n\nSi pendant l'effet actif de la carte (3 tours), vous avez pas subi une seule attaque mais plusieurs attaques, vous obtiendrez la carte offensive de la première attaque que vous avez encaissé."},{"name": "Katon","type": "special","target": "self","element": "none","rarity": "B","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/DFIw8Md.png","description": "Cette carte vous confère une deuxième nature de chakra, le Katon.\n\nSi vous aviez déjà le chakra Katon, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Suiton","type": "special","target": "self","element": "none","rarity": "B","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/AgSInSL.png","description": "Cette carte vous confère une deuxième nature de chakra, le Suiton.\n\nSi vous aviez déjà le chakra Suiton, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Doton","type": "special","target": "self","element": "none","rarity": "B","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/nhbsCNQ.png","description": "Cette carte vous confère une deuxième nature de chakra, le Doton.\n\nSi vous aviez déjà le chakra Doton, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Raiton","type": "special","target": "self","element": "none","rarity": "B","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/etsmx1i.png","description": "Cette carte vous confère une deuxième nature de chakra, le Raiton.\n\nSi vous aviez déjà le chakra Raiton, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Futon","type": "special","target": "self","element": "none","rarity": "B","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/6uW7aGg.png","description": "Cette carte vous confère une deuxième nature de chakra, le Futon.\n\nSi vous aviez déjà le chakra Futon, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Kai","type": "special","target": "self","element": "none","rarity": "B","copies": 4,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/mbmVwox.gif","description": "La technique KAI vous libère instantanément de l'effet d'un [Genjutsu] ennemi.\n\n● Kai + Kai = la fusion de deux cartes Kai crée une nouvelle carte [Sōten Kaihō]. Le Sōten Kaihō vous libère instantanément de l'effet d'un [Tsukuyomi] ou [Kotoamatsukami]\n\n● Mangekyo Sharingan + Kai = libère instantanément de l'effet d'un [Tsukuyomi] ou [Kotoamatsukami]"},{"name": "Sōten Kaihō","type": "special","target": "self","element": "none","rarity": "A","copies": 0,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/QQIluJZ.gif","description": "Le Sōten Kaihō vous libère instantanément de l'effet d'un [Tsukuyomi] ou [Kotoamatsukami]."},{"name": "Taijutsu","type": "normal","target": "self","element": "none","rarity": "D","copies": 6,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/zekEOPN.jpeg","description": "Permet de piocher deux fois."},{"name": "Coup de pied","type": "normal","target": "single","element": "none","rarity": "B","copies": 4,"damage": 1,"uses": "1","duration": "1","gif": "https://i.imgur.com/1T4HTsK.gif","description": "Coup de pied qui inflige 1 de dégât. Cette attaque passe au travers des techniques mise en mode contre."},{"name": "Coup de poing","type": "normal","target": "single","element": "none","rarity": "B","copies": 4,"damage": 1,"uses": "1","duration": "1","gif": "https://i.imgur.com/QKuKkhh.gif","description": "Coup de poing qui inflige 1 de dégât. Cette attaque passe au travers des techniques mise en mode contre."},{"name": "Omote Renge","type": "normal","target": "single","element": "none","rarity": "A","copies": 0,"damage": 6,"uses": "1","duration": "1","gif": "https://i.imgur.com/4wquTF6.gif","description": "La tornade de Konoha inflige 6 de dégâts. Cette attaque passe au travers des techniques mise en mode contre.\n\nPioche une carte supplémentaire."},{"name": "Shishi Rendan","type": "normal","target": "single","element": "none","rarity": "B","copies": 0,"damage": 3,"uses": "1","duration": "1","gif": "https://i.imgur.com/AtdWkEd.gif","description": "La Fleur de Lotus inflige 3 de dégâts. Cette attaque passe au travers des techniques mise en mode contre. \n\nPioche une carte supplémentaire."},{"name": "Ouverture de la Première Porte","type": "normal","target": "self","element": "none","rarity": "A","copies": 2,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/2B2yVWY.gif","description": "Lorsque vous activez la Première Porte, cette dernière reste active pendant 10 tours."},{"name": "Switch Element","type": "special","target": "self","element": "none","rarity": "A","copies": 2,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/UIAqEqs.jpeg","description": "Cette carte vous permet de détruire un de vos chakras de nature pour le remplacer aléatoirement par un autre."}],
            3: [{"name": "Katon - Gôkakyû no Jutsu","type": "offensive","target": "single","element": "katon","rarity": "C","copies": 7,"damage": 3,"uses": "1","duration": "1","gif": "https://i.imgur.com/Z1d2f99.gif","description": "Si cette technique entre en collision avec une technique SUITON, la technique perd automatiquement.\n\nLa technique Suiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Katon - Kasumi Enbon No Jutsu","type": "special","target": "aoe-all","element": "katon","rarity": "B","copies": 5,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/V1NXxLf.gif","description": "Cette technique crée un brouillard dans toute l'arène pendant 3 tours.\n\nToutes les techniques Katon réalisées au sein du brouillard sont augmentées de 3 dégâts supplémentaires. Attention, même les adversaires utilisant une technique katon profite du boost."},{"name": "Katon - Gôka Mekkyaku","type": "offensive","target": "aoe-all","element": "katon","rarity": "A","copies": 4,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/N2M0jQR.gif","description": "Si cette technique entre en collision avec une technique SUITON, la technique perd automatiquement.\n\nLa technique Suiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Suirô no Jutsu","type": "special","target": "single","element": "suiton","rarity": "B","copies": 4,"damage": 0,"uses": "1","duration": "2","gif": "https://i.imgur.com/2WDCIxS.gif","description": "Vous ciblez un adversaire, il se fait enfermer dans une prison aqueuse. Il ne peut pas jouer de carte, mais il peut toujours piocher une carte.\n\nLe seul moyen de rompre cette technique (outre la durée active de 2 tours), ce serait qu'un AUTRE JOUEUR attaque le joueur qui a lancé LA PRISON AQUEUSE."},{"name": "Suiton - Suijinheki","type": "defensive","target": "self","element": "suiton","rarity": "A","copies": 4,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/E3Wdow9.gif","description": "[Mode Contre Only]\n\nSuiton Suijinheki contre et bloque toutes les techniques élémentaires à l'exception des techniques élémentaires du type [KATON]."},{"name": "Suiton - Dai Bakusui Shôha","type": "offensive","target": "aoe-all","element": "suiton","rarity": "C","copies": 7,"damage": 3,"uses": "1","duration": "1","gif": "https://i.imgur.com/3MdKn57.gif","description": "Si cette technique entre en collision avec une technique DOTON, la technique perd automatiquement. La technique Doton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Doton Kekkai - Dorô Dômu","type": "special","target": "single","element": "doton","rarity": "B","copies": 5,"damage": 2,"uses": "1","duration": "1","gif": "https://i.imgur.com/knukque.gif","description": "Cette technique fait perdre 2 HP à l'adversaire piégé dans la technique, mais l'utilisateur récupère 3 HP.\n\nSi cette technique entre en collision avec une technique RAITON (défensive), la technique perd automatiquement."},{"name": "Doton - Kôka Jutsu","type": "defensive","target": "self","element": "doton","rarity": "B","copies": 5,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/iePhqAZ.gif","description": "Cette technique réduit de 3 les dégâts des techniques adverses à notre encontre pendant 2 tours.\n\nContre les techniques RAITON (offensive), la réduction de dégât est seulement de 1."},{"name": "Doton - Doryûdan","type": "offensive","target": "aoe-all","element": "doton","rarity": "B","copies": 5,"damage": 3,"uses": "1","duration": "1","gif": "https://i.imgur.com/SQa5ulO.gif","description": "Si cette technique entre en collision avec une technique RAITON, la technique perd automatiquement. La technique Raiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Raikiri","type": "offensive","target": "single","element": "raiton","rarity": "A","copies": 4,"damage": 5,"uses": "1","duration": "1","gif": "https://i.imgur.com/W3XWD5y.gif","description": "Si cette technique entre en collision avec une technique Futon, la technique perd automatiquement. La technique Futon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Jigokuzuki","type": "offensive","target": "single","element": "raiton","rarity": "B","copies": 6,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/XIvFcv1.gif","description": "Aléatoirement, un des doigts est utilisé pour réaliser l'attaque.\n\n• Quatre doigts : 2 de dégâts\n• Trois doigts : 3 de dégâts\n• Deux doigts : 4 de dégâts\n• Un doigt : 6 de dégâts\n\nSi cette technique entre en collision avec une technique Futon, la technique perd automatiquement. La technique Futon, si elle est de nature offensive, détruit le Chidori Nagashi et atteint l'adversaire."},{"name": "Chidori Nagashi","type": "defensive","target": "self","element": "raiton","rarity": "B","copies": 7,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/7LZ0KQC.gif","description": "Cette technique réduit de 2 HP les dégâts causés par les techniques adverses.\n\nSi cette technique entre en collision avec une technique Futon, la technique perd automatiquement. La technique Futon, si elle est de nature offensive, détruit le Chidori Nagashi et atteint l'adversaire."},{"name": "Fūton - Reppuken","type": "offensive","target": "aoe-all","element": "futon","rarity": "A","copies": 3,"damage": 5,"uses": "1","duration": "1","gif": "https://i.imgur.com/3S5YqIs.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Fûton - Daitoppa","type": "offensive","target": "aoe-all","element": "futon","rarity": "C","copies": 6,"damage": 2,"uses": "1","duration": "1","gif": "https://i.imgur.com/BKxexkV.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Sharingan","type": "special","target": "single","element": "none","rarity": "A","copies": 4,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/0beNQlK.gif","description": "Lorsque le Sharingan est utilisé, il peut créer une carte d'une technique précédemment utilisé par un adversaire durant la partie. Cette carte crée est automatiquement ajoutée dans la main du joueur.\n\nSi vous avez déjà une main pleine, vous devez défausser une carte au choix pour pouvoir l'ajouter dans la main."},{"name": "Mangekyo Sharingan (Obito/Kakashi)","type": "special","target": "self","element": "none","rarity": "S","copies": 2,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/WHoOPTE.gif","description": "Vous obtenez le Mangekyo Sharingan (Obito/Kakashi), mais les yeux en eux-même ne servent à rien.\n\nMais grâce à ces yeux, vous pouvez utiliser une carte \"Kamui [O]\" si vous en avez une en votre possession.\n\nDe plus, la carte \"Genjutsu\" est inefficace contre un utilisateur de Mangekyo Sharingan."},{"name": "Mangekyo Sharingan (Itachi)","type": "special","target": "self","element": "none","rarity": "S","copies": 2,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/kobGRqe.gif","description": "Vous obtenez le Mangekyo Sharingan (Itachi), mais les yeux en eux-même ne servent à rien. \n\nMais grâce à ces yeux, vous pouvez utiliser une carte \"Amaterasu\" ou \"Tsukuyomi\" si vous en avez une en votre possession.\n\nDe plus, la carte \"Genjutsu\" est inefficace contre un utilisateur de Mangekyo Sharingan."},{"name": "Mangekyo Sharingan (Sasuke)","type": "special","target": "self","element": "none","rarity": "S","copies": 2,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/boTAsPj.gif","description": "Vous obtenez le Mangekyo Sharingan (Sasuke), mais les yeux en eux-même ne servent à rien. \n\nMais grâce à ces yeux, vous pouvez utiliser une carte \"Amaterasu\" ou \"Kagatsuchi\" si vous en avez une en votre possession.\n\nDe plus, la carte \"Genjutsu\" est inefficace contre un utilisateur de Mangekyo Sharingan."},{"name": "Mangekyo Sharingan (Shisui)","type": "special","target": "self","element": "none","rarity": "S","copies": 2,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/6rYg7od.gif","description": "Vous obtenez le Mangekyo Sharingan (Sasuke), mais les yeux en eux-même ne servent à rien. \n\nMais grâce à ces yeux, vous pouvez utiliser une carte \"Kotoamatsukami\" si vous en avez une en votre possession.\n\nDe plus, la carte \"Genjutsu\" est inefficace contre un utilisateur de Mangekyo Sharingan."},{"name": "Byakugan","type": "special","target": "self","element": "none","rarity": "S","copies": 2,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/nlHT5DC.gif","description": "Vous obtenez le Byakugan, mais les yeux en eux-même ne servent à rien. \n\nMais grâce à ces yeux, vous pouvez utiliser les cartes suivantes si vous en avez une en votre possession.\n\n- Vision 360\n- Jûken\n- Hakkeshô Kaiten\n- Yasogami Kûgeki"},{"name": "Kamui [O]","type": "special","target": "self","element": "none","rarity": "A","copies": 2,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/1U0soxO.gif","description": "Vous êtes insensibles aux dégâts adverses pendant 3 tours. De plus, vous êtes libres de défausser toutes vos cartes d'un coup pour tirer 5 nouvelles cartes.\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Obito)."},{"name": "Kamui [K]","type": "special","target": "single","element": "none","rarity": "S","copies": 3,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/MmB1fov.gif","description": "[Mode Contre Only]\\n\\nDéfausse entièrement la main de l'assaillant.\\n\\nDe plus, en fonction de ce que l'assaillant possède dans sa main avant la défausse, vous pouvez lui infliger un certain nombre de dégâts :\\n\\n- Dojutsu : -1HP (cumulable)\\n- Techniques Dojutsus : -1HP (cumulable)\\n- Sharingan : -1HP (cumulable)","requiredDojutsu": "Mangekyo Sharingan (Obito/Kakashi)"},{"name": "Amaterasu","type": "special","target": "single","element": "none","rarity": "S","copies": 2,"damage": 8,"uses": "1","duration": "1","gif": "https://i.imgur.com/5lXyEsK.gif","description": "Vous infligez 8 de dégâts à l'adversaire ciblé. \n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Itachi) ou le Mangekyo Sharingan (Sasuke)."},{"name": "Tsukuyomi","type": "special","target": "single","element": "none","rarity": "S","copies": 2,"damage": 0,"uses": "1","duration": "4","gif": "https://i.imgur.com/VKC8Rhm.gif","description": "Votre adversaire ciblé perd 1 HP à chaque tour pendant 5 tours. De plus, vous avez la vision sur sa main (cartes dévoilées) pendant 5 tours.\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Itachi)."},{"name": "Kagatsuchi","type": "special","target": "self","element": "none","rarity": "A","copies": 2,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/q0ix6nZ.gif","description": "Cette carte \"Kagatsuchi\" doit être combiné avec la carte \"Amaterasu\". Une fois les deux cartes combinées, le \"Amaterasu\" ne touche pas qu'une seule cible (mono-cible) mais tous les adversaires de l'arène (AOE-All).\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Sasuke)."},{"name": "Kotoamatsukami","type": "special","target": "single","element": "none","rarity": "S","copies": 2,"damage": 0,"uses": "1","duration": "5","gif": "https://i.imgur.com/ItpkTsV.gif","description": "Votre adversaire ne peut plus piocher pendant 3 tours. De plus, force l'adversaire ciblé à attaquer (s'il possède une technique capable d'être lancée) un autre adversaire de votre choix.\n\nTant que l'adversaire est sous l'emprise du Kotoamatsukami, vous pouvez utiliser ses cartes offensives ou défensives.\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Shisui)."},{"name": "Vision 360","type": "special","target": "single","element": "none","rarity": "C","copies": 5,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/UtK6qIk.gif","description": "• Effet Mono-Cible : vous pouvez voir une carte de la main de l'adversaire ciblé.\n\n• Effet AOE : Vous pouvez voir toutes les cartes de main \"Genjutsu\" de tous vos adversaires"},{"name": "Jûken","type": "offensive","target": "single","element": "none","rarity": "B","copies": 5,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/0GaETPk.gif","description": "Aléatoirement, vous réalisez un des techniques suivantes :\n\n• 16 Poings du Hakke : 1 de dégât \n• 32 Poings du Hakke : 2 de dégâts \n• 64 Poings du Hakke : 3 de dégâts \n• 128 Poings du Hakke : 4 de dégâts"},{"name": "Hakkeshô Kaiten","type": "defensive","target": "self","element": "none","rarity": "A","copies": 3,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/9V3YcPI.gif","description": "[Mode Contre Only] :\n\nTechnique qui se déclenche automatiquement contre les attaques adverses à votre encontre, et qui les annule. Cette technique annule toutes les techniques offensives élémentaires et dojutsus.\n\nDe plus, l'adversaire à l'origine de l'attaque perd 2 HP."},{"name": "Yasogami Kûgeki","type": "offensive","target": "multi-2","element": "none","rarity": "S","copies": 2,"damage": 7,"uses": "1","duration": "1","gif": "https://i.imgur.com/HI2uTmr.png","description": "Cette technique possède la particularité de ne pas pouvoir être contré/bloqué par aucune autre technique (même en contre défensif) sauf à l'exception de Kamui (insensibilité aux dégâts), et potentiellement le Kotoamatsukami (selon le contexte)"},{"name": "Edo Tensei","type": "special","target": "self","element": "none","rarity": "S","copies": 1,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/dgdBchY.gif","description": "Cette technique permet de ranimer un personnage de son choix parmi la liste suivante (un tour uniquement) : \n\n• Sarutobi Hiruzen\n• Uchiwa Obito\n• Uchiwa Sasuke\n• Uchiwa Itachi\n• Uchiwa Shisui\n• Uchiwa Obito\n• Hyûga Neji\n• Ōtsutsuki Kaguya \n\nUne fois le personnage invoqué, vous pourrez utiliser aléatoirement une des techniques affiliées à son dojutsu (soit tout le monde sauf Hiruzen Sarutobi). \n\nSi la technique utilisée est un dojutsu qui nécessite de cibler un adversaire, et bien vous ciblez l'adversaire de votre choix.\n\nDans le cas de Obito Uchiwa, si Kamui s'active, Obito vous protégera des techniques adverses pendant 3 tours.\n\nQuant à Sarutobi Hiruzen, si vous l'invoquez, vous pouvez choisir une nature de chakra parmi les cinq éléments de base, et une technique affiliée à cet élément de chakra sera utilisé de façon aléatoire sur l'adversaire de votre choix.\n\n[ATTENTION] : Cette technique vous enlève 1 HP à chaque tour pendant le restant de la partie."},{"name": "Reverse Jutsu","type": "special","target": "self","element": "none","rarity": "A","copies": 5,"damage": 0,"uses": "1","duration": "5","gif": "https://i.imgur.com/rQ9LcRU.jpeg","description": "Permet de sacrifier une carte technique élémentaire de votre main pour créer une nouvelle carte technique élémentaire de votre choix parmi toutes les cartes existantes dans le jeu. Vous obtiendrez votre carte seulement après la fin de la durée active (5 tours).\n\nAttention, la carte sacrifiée et la carte crée doivent avoir la même rareté."},{"name": "Kirigakure no Jutsu","type": "special","target": "self","element": "suiton","rarity": "B","copies": 5,"damage": 0,"uses": "1","duration": "2","gif": "https://i.imgur.com/uIewbXK.gif","description": "Tant que la brume est active, vous êtes immunisés contre :\n\n- Genjutsu\n- Tsukuyomi\n- Kotoamatsukami\n- Vision 360\n- Vision (pouvoir)\n- Shiki Fūjin\n- Scellement du chakra élémentaire\n- Destruction de Carte\n- Switch Rumble\n- Sharingan (mais seulement pour les techniques que vous utilisez au sein de votre brume, donc les techniques défensives par exemple)"},{"name": "Kaze no Yaiba","type": "offensive","target": "single","element": "futon","rarity": "B","copies": 6,"damage": 2,"uses": "2","duration": "1","gif": "https://i.imgur.com/IqSMFhM.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Shinkû Renpa","type": "offensive","target": "multi-2","element": "futon","rarity": "B","copies": 5,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/tMLiIhl.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Katon - Gôryûka no jutsu","type": "offensive","target": "multi-2","element": "katon","rarity": "A","copies": 4,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/FUNeepD.gif","description": "Si cette technique entre en collision avec une technique SUITON, la technique perd automatiquement. La technique Suiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Doton - Domu","type": "offensive","target": "single","element": "doton","rarity": "B","copies": 5,"damage": 2,"uses": "2","duration": "1","gif": "https://i.imgur.com/URtX3sG.gif","description": "Si cette technique entre en collision avec une technique RAITON, la technique perd automatiquement (annulation). La technique Raiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Genjutsu","type": "special","target": "single","element": "none","rarity": "B","copies": 5,"damage": 0,"uses": "1","duration": "2","gif": "https://i.imgur.com/huxeWc3.gif","description": "Empêche l'adversaire de votre choix de piocher une carte pendant deux tours."},{"name": "Shiki Fûjin","type": "special","target": "single","element": "none","rarity": "A","copies": 2,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/HePlZJx.gif","description": "Lorsque vous activez Shiki Fûjin, pendant 3 tours, le Shinigami reste actif à vos côtés.\n\nMode Contre (uniquement) : \n\n● Si vous réalisez une contre-attaque face à une technique du type élémentaire, vous pouvez extraire et détruire sur le joueur qui vous a attaqué, une nature de chakra élémentaire au choix\n\n● Si vous réalisez une contre-attaque face à une technique du type dojutsu (Amaterasu, Tsukuyomi, Juken, Yasogami Kûgeki), vous pouvez extraire et détruire sur le joueur qui vous a attaqué, son dojutsu.\n\n● Si vous réalisez une contre-attaque face à une attaque provenant d'une arme, vous pouvez extraire et détruire sur le joueur qui vous a attaqué, son arme."},{"name": "Kirin","type": "offensive","target": "aoe-all","element": "raiton","rarity": "A","copies": 3,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/fd2Li4w.gif","description": "Si cette technique entre en collision avec une technique Futon, la technique perd automatiquement. La technique Futon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Fûnyû no Jutsu","type": "special","target": "self","element": "none","rarity": "A","copies": 5,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/PcyLX0e.gif","description": "Si vous activez le Fûnyû no Jutsu, et que pendant la durée active (3 tours), vous encaissez des dégâts d'une attaque élémentaire ennemie, alors vous pourrez ensuite (à la fin de la durée active) obtenir la carte élémentaire utilisée par l'adversaire contre vous.\n\nSi vous avez déjà 7 cartes dans votre main, vous en défaussez une, et vous récupérez votre nouvelle carte.\n\nSi pendant l'effet actif de la carte (3 tours), vous avez pas subi une seule attaque mais plusieurs attaques, vous obtiendrez la carte offensive de la première attaque que vous avez encaissé."},{"name": "Katon","type": "special","target": "self","element": "none","rarity": "B","copies": 5,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/DFIw8Md.png","description": "Cette carte vous confère une deuxième nature de chakra, le Katon.\n\nSi vous aviez déjà le chakra Katon, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Suiton","type": "special","target": "self","element": "none","rarity": "B","copies": 5,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/AgSInSL.png","description": "Cette carte vous confère une deuxième nature de chakra, le Suiton.\n\nSi vous aviez déjà le chakra Suiton, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Doton","type": "special","target": "self","element": "none","rarity": "B","copies": 5,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/nhbsCNQ.png","description": "Cette carte vous confère une deuxième nature de chakra, le Doton.\n\nSi vous aviez déjà le chakra Doton, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Raiton","type": "special","target": "self","element": "none","rarity": "B","copies": 5,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/etsmx1i.png","description": "Cette carte vous confère une deuxième nature de chakra, le Raiton.\n\nSi vous aviez déjà le chakra Raiton, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Futon","type": "special","target": "self","element": "none","rarity": "B","copies": 5,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/6uW7aGg.png","description": "Cette carte vous confère une deuxième nature de chakra, le Futon.\n\nSi vous aviez déjà le chakra Futon, vous n'aurez malheureusement qu'un seul type de chakra pour le restant de la partie."},{"name": "Kai","type": "special","target": "self","element": "none","rarity": "B","copies": 5,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/mbmVwox.gif","description": "La technique KAI vous libère instantanément de l'effet d'un [Genjutsu] ennemi.\n\n● Kai + Kai = la fusion de deux cartes Kai crée une nouvelle carte [Sōten Kaihō]. Le Sōten Kaihō vous libère instantanément de l'effet d'un [Tsukuyomi] ou [Kotoamatsukami]\n\n● Mangekyo Sharingan + Kai = libère instantanément de l'effet d'un [Tsukuyomi] ou [Kotoamatsukami]"},{"name": "Sōten Kaihō","type": "special","target": "self","element": "none","rarity": "A","copies": 0,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/QQIluJZ.gif","description": "Le Sōten Kaihō vous libère instantanément de l'effet d'un [Tsukuyomi] ou [Kotoamatsukami]."},{"name": "Taijutsu","type": "normal","target": "self","element": "none","rarity": "D","copies": 8,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/zekEOPN.jpeg","description": "Permet de piocher deux fois."},{"name": "Coup de pied","type": "normal","target": "single","element": "none","rarity": "B","copies": 5,"damage": 1,"uses": "1","duration": "1","gif": "https://i.imgur.com/1T4HTsK.gif","description": "Coup de pied qui inflige 1 de dégât. Cette attaque passe au travers des techniques mise en mode contre."},{"name": "Coup de poing","type": "normal","target": "single","element": "none","rarity": "B","copies": 5,"damage": 1,"uses": "1","duration": "1","gif": "https://i.imgur.com/QKuKkhh.gif","description": "Coup de poing qui inflige 1 de dégât. Cette attaque passe au travers des techniques mise en mode contre."},{"name": "Omote Renge","type": "normal","target": "single","element": "none","rarity": "A","copies": 0,"damage": 6,"uses": "1","duration": "1","gif": "https://i.imgur.com/4wquTF6.gif","description": "La tornade de Konoha inflige 6 de dégâts. Cette attaque passe au travers des techniques mise en mode contre.\n\nPioche une carte supplémentaire."},{"name": "Shishi Rendan","type": "normal","target": "single","element": "none","rarity": "B","copies": 0,"damage": 3,"uses": "1","duration": "1","gif": "https://i.imgur.com/AtdWkEd.gif","description": "La Fleur de Lotus inflige 3 de dégâts. Cette attaque passe au travers des techniques mise en mode contre. \n\nPioche une carte supplémentaire."},{"name": "Ouverture de la Première Porte","type": "normal","target": "self","element": "none","rarity": "A","copies": 3,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/2B2yVWY.gif","description": "Lorsque vous activez la Première Porte, cette dernière reste active pendant 10 tours."},{"name": "Switch Element","type": "special","target": "self","element": "none","rarity": "A","copies": 3,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/UIAqEqs.jpeg","description": "Cette carte vous permet de détruire un de vos chakras de nature pour le remplacer aléatoirement par un autre."}],
            4: [{"name": "Katon - Gôkakyû no Jutsu","type": "offensive","target": "single","element": "katon","rarity": "C","copies": 9,"damage": 3,"uses": "1","duration": "1","gif": "https://i.imgur.com/Z1d2f99.gif","description": "Si cette technique entre en collision avec une technique SUITON, la technique perd automatiquement.\n\nLa technique Suiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Katon - Kasumi Enbon No Jutsu","type": "special","target": "aoe-all","element": "katon","rarity": "B","copies": 6,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/V1NXxLf.gif","description": "Cette technique crée un brouillard dans toute l'arène pendant 3 tours.\n\nToutes les techniques Katon réalisées au sein du brouillard sont augmentées de 3 dégâts supplémentaires. Attention, même les adversaires utilisant une technique katon profite du boost."},{"name": "Katon - Gôka Mekkyaku","type": "offensive","target": "aoe-all","element": "katon","rarity": "A","copies": 4,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/N2M0jQR.gif","description": "Si cette technique entre en collision avec une technique SUITON, la technique perd automatiquement.\n\nLa technique Suiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Suirô no Jutsu","type": "special","target": "single","element": "suiton","rarity": "B","copies": 5,"damage": 0,"uses": "1","duration": "2","gif": "https://i.imgur.com/2WDCIxS.gif","description": "Vous ciblez un adversaire, il se fait enfermer dans une prison aqueuse. Il ne peut pas jouer de carte, mais il peut toujours piocher une carte.\n\nLe seul moyen de rompre cette technique (outre la durée active de 2 tours), ce serait qu'un AUTRE JOUEUR attaque le joueur qui a lancé LA PRISON AQUEUSE."},{"name": "Suiton - Suijinheki","type": "defensive","target": "self","element": "suiton","rarity": "A","copies": 5,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/E3Wdow9.gif","description": "[Mode Contre Only]\n\nSuiton Suijinheki contre et bloque toutes les techniques élémentaires à l'exception des techniques élémentaires du type [KATON]."},{"name": "Suiton - Dai Bakusui Shôha","type": "offensive","target": "aoe-all","element": "suiton","rarity": "C","copies": 8,"damage": 3,"uses": "1","duration": "1","gif": "https://i.imgur.com/3MdKn57.gif","description": "Si cette technique entre en collision avec une technique DOTON, la technique perd automatiquement. La technique Doton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Doton Kekkai - Dorô Dômu","type": "special","target": "single","element": "doton","rarity": "B","copies": 6,"damage": 2,"uses": "1","duration": "1","gif": "https://i.imgur.com/knukque.gif","description": "Cette technique fait perdre 2 HP à l'adversaire piégé dans la technique, mais l'utilisateur récupère 3 HP.\n\nSi cette technique entre en collision avec une technique RAITON (défensive), la technique perd automatiquement."},{"name": "Doton - Kôka Jutsu","type": "defensive","target": "self","element": "doton","rarity": "B","copies": 6,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/iePhqAZ.gif","description": "Cette technique réduit de 3 les dégâts des techniques adverses à notre encontre pendant 2 tours.\n\nContre les techniques RAITON (offensive), la réduction de dégât est seulement de 1."},{"name": "Doton - Doryûdan","type": "offensive","target": "aoe-all","element": "doton","rarity": "B","copies": 6,"damage": 3,"uses": "1","duration": "1","gif": "https://i.imgur.com/SQa5ulO.gif","description": "Si cette technique entre en collision avec une technique RAITON, la technique perd automatiquement. La technique Raiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Raikiri","type": "offensive","target": "single","element": "raiton","rarity": "A","copies": 5,"damage": 5,"uses": "1","duration": "1","gif": "https://i.imgur.com/W3XWD5y.gif","description": "Si cette technique entre en collision avec une technique Futon, la technique perd automatiquement. La technique Futon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Jigokuzuki","type": "offensive","target": "single","element": "raiton","rarity": "B","copies": 7,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/XIvFcv1.gif","description": "Aléatoirement, un des doigts est utilisé pour réaliser l'attaque.\n\n• Quatre doigts : 2 de dégâts\n• Trois doigts : 3 de dégâts\n• Deux doigts : 4 de dégâts\n• Un doigt : 5 de dégâts\n\nSi cette technique entre en collision avec une technique Futon, la technique perd automatiquement. La technique Futon, si elle est de nature offensive, détruit le Chidori Nagashi et atteint l'adversaire."},{"name": "Chidori Nagashi","type": "defensive","target": "self","element": "raiton","rarity": "B","copies": 8,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/7LZ0KQC.gif","description": "Cette technique réduit de 2 HP les dégâts causés par les techniques adverses.\n\nSi cette technique entre en collision avec une technique Futon, la technique perd automatiquement. La technique Futon, si elle est de nature offensive, détruit le Chidori Nagashi et atteint l'adversaire."},{"name": "Fūton - Reppuken","type": "offensive","target": "aoe-2","element": "futon","rarity": "A","copies": 4,"damage": 5,"uses": "1","duration": "1","gif": "https://i.imgur.com/3S5YqIs.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Fûton - Daitoppa","type": "offensive","target": "aoe-all","element": "futon","rarity": "C","copies": 7,"damage": 2,"uses": "1","duration": "1","gif": "https://i.imgur.com/BKxexkV.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Sharingan","type": "special","target": "single","element": "none","rarity": "A","copies": 5,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/0beNQlK.gif","description": "Lorsque le Sharingan est utilisé, il peut créer une carte d'une technique précédemment utilisé par un adversaire durant la partie. Cette carte crée est automatiquement ajoutée dans la main du joueur.\n\nSi vous avez déjà une main pleine, vous devez défausser une carte au choix pour pouvoir l'ajouter dans la main."},{"name": "Mangekyo Sharingan (Obito/Kakashi)","type": "special","target": "self","element": "none","rarity": "S","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/WHoOPTE.gif","description": "Vous obtenez le Mangekyo Sharingan (Obito/Kakashi), mais les yeux en eux-même ne servent à rien.\n\nMais grâce à ces yeux, vous pouvez utiliser une carte \"Kamui [O]\" si vous en avez une en votre possession.\n\nDe plus, la carte \"Genjutsu\" est inefficace contre un utilisateur de Mangekyo Sharingan."},{"name": "Mangekyo Sharingan (Itachi)","type": "special","target": "self","element": "none","rarity": "S","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/kobGRqe.gif","description": "Vous obtenez le Mangekyo Sharingan (Itachi), mais les yeux en eux-même ne servent à rien. \n\nMais grâce à ces yeux, vous pouvez utiliser une carte \"Amaterasu\" ou \"Tsukuyomi\" si vous en avez une en votre possession.\n\nDe plus, la carte \"Genjutsu\" est inefficace contre un utilisateur de Mangekyo Sharingan."},{"name": "Mangekyo Sharingan (Sasuke)","type": "special","target": "self","element": "none","rarity": "S","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/boTAsPj.gif","description": "Vous obtenez le Mangekyo Sharingan (Sasuke), mais les yeux en eux-même ne servent à rien. \n\nMais grâce à ces yeux, vous pouvez utiliser une carte \"Amaterasu\" ou \"Kagatsuchi\" si vous en avez une en votre possession.\n\nDe plus, la carte \"Genjutsu\" est inefficace contre un utilisateur de Mangekyo Sharingan."},{"name": "Mangekyo Sharingan (Shisui)","type": "special","target": "self","element": "none","rarity": "S","copies": 3,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/6rYg7od.gif","description": "Vous obtenez le Mangekyo Sharingan (Sasuke), mais les yeux en eux-même ne servent à rien. \n\nMais grâce à ces yeux, vous pouvez utiliser une carte \"Kotoamatsukami\" si vous en avez une en votre possession.\n\nDe plus, la carte \"Genjutsu\" est inefficace contre un utilisateur de Mangekyo Sharingan."},{"name": "Byakugan","type": "special","target": "self","element": "none","rarity": "S","copies": 4,"damage": 0,"uses": "permanent","duration": "permanent","gif": "https://i.imgur.com/nlHT5DC.gif","description": "Vous obtenez le Byakugan, mais les yeux en eux-même ne servent à rien. \n\nMais grâce à ces yeux, vous pouvez utiliser les cartes suivantes si vous en avez une en votre possession.\n\n- Vision 360\n- Jûken\n- Hakkeshô Kaiten\n- Yasogami Kûgeki"},{"name": "Kamui [O]","type": "special","target": "self","element": "none","rarity": "A","copies": 3,"damage": 0,"uses": "1","duration": "3","gif": "https://i.imgur.com/1U0soxO.gif","description": "Vous êtes insensibles aux dégâts adverses pendant 3 tours. De plus, vous êtes libres de défausser toutes vos cartes d'un coup pour tirer 5 nouvelles cartes.\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Obito)."},{"name": "Kamui [K]","type": "special","target": "single","element": "none","rarity": "S","copies": 3,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/MmB1fov.gif","description": "[Mode Contre Only]\\n\\nDéfausse entièrement la main de l'assaillant.\\n\\nDe plus, en fonction de ce que l'assaillant possède dans sa main avant la défausse, vous pouvez lui infliger un certain nombre de dégâts :\\n\\n- Dojutsu : -1HP (cumulable)\\n- Techniques Dojutsus : -1HP (cumulable)\\n- Sharingan : -1HP (cumulable)","requiredDojutsu": "Mangekyo Sharingan (Obito/Kakashi)"},{"name": "Amaterasu","type": "special","target": "single","element": "none","rarity": "S","copies": 3,"damage": 8,"uses": "1","duration": "1","gif": "https://i.imgur.com/5lXyEsK.gif","description": "Vous infligez 8 de dégâts à l'adversaire ciblé. \n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Itachi) ou le Mangekyo Sharingan (Sasuke)."},{"name": "Tsukuyomi","type": "special","target": "single","element": "none","rarity": "S","copies": 3,"damage": 0,"uses": "1","duration": "4","gif": "https://i.imgur.com/VKC8Rhm.gif","description": "Votre adversaire ciblé perd 1 HP à chaque tour pendant 5 tours. De plus, vous avez la vision sur sa main (cartes dévoilées) pendant 5 tours.\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Itachi)."},{"name": "Kagatsuchi","type": "special","target": "self","element": "none","rarity": "A","copies": 3,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/q0ix6nZ.gif","description": "Cette carte \"Kagatsuchi\" doit être combiné avec la carte \"Amaterasu\". Une fois les deux cartes combinées, le \"Amaterasu\" ne touche pas qu'une seule cible (mono-cible) mais tous les adversaires de l'arène (AOE-All).\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Sasuke)."},{"name": "Kotoamatsukami","type": "special","target": "single","element": "none","rarity": "S","copies": 3,"damage": 0,"uses": "1","duration": "5","gif": "https://i.imgur.com/ItpkTsV.gif","description": "Votre adversaire ne peut plus piocher pendant 3 tours. De plus, force l'adversaire ciblé à attaquer (s'il possède une technique capable d'être lancée) un autre adversaire de votre choix.\n\nTant que l'adversaire est sous l'emprise du Kotoamatsukami, vous pouvez utiliser ses cartes offensives ou défensives.\n\nCela ne fonctionne que si vous possédez le Mangekyo Sharingan (Shisui)."},{"name": "Vision 360","type": "special","target": "single","element": "none","rarity": "C","copies": 6,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/UtK6qIk.gif","description": "• Effet Mono-Cible : vous pouvez voir une carte de la main de l'adversaire ciblé.\n\n• Effet AOE : Vous pouvez voir toutes les cartes de main \"Genjutsu\" de tous vos adversaires"},{"name": "Jûken","type": "offensive","target": "single","element": "none","rarity": "B","copies": 6,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/0GaETPk.gif","description": "Aléatoirement, vous réalisez un des techniques suivantes :\n\n• 16 Poings du Hakke : 1 de dégât \n• 32 Poings du Hakke : 2 de dégâts \n• 64 Poings du Hakke : 3 de dégâts \n• 128 Poings du Hakke : 4 de dégâts"},{"name": "Hakkeshô Kaiten","type": "defensive","target": "self","element": "none","rarity": "A","copies": 4,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/9V3YcPI.gif","description": "[Mode Contre Only] :\n\nTechnique qui se déclenche automatiquement contre les attaques adverses à votre encontre, et qui les annule. Cette technique annule toutes les techniques offensives élémentaires et dojutsus.\n\nDe plus, l'adversaire à l'origine de l'attaque perd 2 HP."},{"name": "Yasogami Kûgeki","type": "offensive","target": "multi-2","element": "none","rarity": "S","copies": 2,"damage": 7,"uses": "1","duration": "1","gif": "https://i.imgur.com/HI2uTmr.png","description": "Cette technique possède la particularité de ne pas pouvoir être contré/bloqué par aucune autre technique (même en contre défensif) sauf à l'exception de Kamui (insensibilité aux dégâts), et potentiellement le Kotoamatsukami (selon le contexte)"},{"name": "Edo Tensei","type": "special","target": "self","element": "none","rarity": "S","copies": 1,"damage": 0,"uses": "1","duration": "1","gif": "https://i.imgur.com/dgdBchY.gif","description": "Cette technique permet de ranimer un personnage de son choix parmi la liste suivante (un tour uniquement) : \n\n• Sarutobi Hiruzen\n• Uchiwa Obito\n• Uchiwa Sasuke\n• Uchiwa Itachi\n• Uchiwa Shisui\n• Uchiwa Obito\n• Hyûga Neji\n• Ōtsutsuki Kaguya \n\nUne fois le personnage invoqué, vous pourrez utiliser aléatoirement une des techniques affiliées à son dojutsu (soit tout le monde sauf Hiruzen Sarutobi). \n\nSi la technique utilisée est un dojutsu qui nécessite de cibler un adversaire, et bien vous ciblez l'adversaire de votre choix.\n\nDans le cas de Obito Uchiwa, si Kamui s'active, Obito vous protégera des techniques adverses pendant 3 tours.\n\nQuant à Sarutobi Hiruzen, si vous l'invoquez, vous pouvez choisir une nature de chakra parmi les cinq éléments de base, et une technique affiliée à cet élément de chakra sera utilisé de façon aléatoire sur l'adversaire de votre choix.\n\n[ATTENTION] : Cette technique vous enlève 1 HP à chaque tour pendant le restant de la partie."},{"name": "Reverse Jutsu","type": "special","target": "self","element": "none","rarity": "A","copies": 6,"damage": 0,"uses": "1","duration": "5","gif": "https://i.imgur.com/rQ9LcRU.jpeg","description": "Permet de sacrifier une carte technique élémentaire de votre main pour créer une nouvelle carte technique élémentaire de votre choix parmi toutes les cartes existantes dans le jeu. Vous obtiendrez votre carte seulement après la fin de la durée active (5 tours).\n\nAttention, la carte sacrifiée et la carte crée doivent avoir la même rareté."},{"name": "Kirigakure no Jutsu","type": "special","target": "self","element": "suiton","rarity": "B","copies": 6,"damage": 0,"uses": "1","duration": "2","gif": "https://i.imgur.com/uIewbXK.gif","description": "Tant que la brume est active, vous êtes immunisés contre :\n\n- Genjutsu\n- Tsukuyomi\n- Kotoamatsukami\n- Vision 360\n- Vision (pouvoir)\n- Shiki Fūjin\n- Scellement du chakra élémentaire\n- Destruction de Carte\n- Switch Rumble\n- Sharingan (mais seulement pour les techniques que vous utilisez au sein de votre brume, donc les techniques défensives par exemple)"},{"name": "Kaze no Yaiba","type": "offensive","target": "single","element": "futon","rarity": "B","copies": 7,"damage": 2,"uses": "2","duration": "1","gif": "https://i.imgur.com/IqSMFhM.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Shinkû Renpa","type": "offensive","target": "multi-2","element": "futon","rarity": "B","copies": 6,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/tMLiIhl.gif","description": "Si cette technique entre en collision avec une technique Katon, la technique perd automatiquement (annulation). La technique Katon, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Katon - Gôryûka no jutsu","type": "offensive","target": "multi-2","element": "katon","rarity": "A","copies": 5,"damage": 4,"uses": "1","duration": "1","gif": "https://i.imgur.com/FUNeepD.gif","description": "Si cette technique entre en collision avec une technique SUITON, la technique perd automatiquement. La technique Suiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Doton - Domu","type": "offensive","target": "single","element": "doton","rarity": "B","copies": 6,"damage": 2,"uses": "2","duration": "1","gif": "https://i.imgur.com/URtX3sG.gif","description": "Si cette technique entre en collision avec une technique RAITON, la technique perd automatiquement (annulation). La technique Raiton, si elle est de nature offensive, continue son chemin vers sa cible ou ses cibles."},{"name": "Genjutsu",         window.createArenaRoom = async () => {
            const playerNameInput = document.getElementById('pn-arena');
            if (!playerNameInput || !playerNameInput.value.trim()) return naAlert('Entrez votre pseudo');
            
            gameState.playerName = playerNameInput.value.trim();
            gameState.roomCode = generateCode();
            gameState.isHost = true;
            gameState.gameMode = 'arena';
            gameState.screen = 'arena-lobby';
            gameState.players = [{
                name: gameState.playerName,
                avatar: localStorage.getItem('narutoArena_avatar') || '',
                isHost: true,
                ready: true
            }];
            
            _log('[ARENA CREATE] Room:', gameState.roomCode);
            _log('[ARENA CREATE] Host:', gameState.playerName);
            
            await saveGame();
            startPolling(gameState.roomCode);
            render();
        };
        
        window.joinArenaRoom = async () => {
            const playerNameInput = document.getElementById('pn-arena');
            const roomCodeInput = document.getElementById('rc-arena');
            
            if (!playerNameInput || !playerNameInput.value.trim()) return naAlert('Entrez votre pseudo');
            if (!roomCodeInput || !roomCodeInput.value.trim()) return naAlert('Entrez le code');
            
            // IMPORTANT: Set BEFORE loading
            gameState.playerName = playerNameInput.value.trim();
            gameState.roomCode = roomCodeInput.value.trim().toUpperCase();
            
            _log('[ARENA JOIN] Player:', gameState.playerName, 'joining room:', gameState.roomCode);
            
            try {
                const { data, error } = await db
                    .from('games')
                    .select('data')
                    .eq('room_code', gameState.roomCode)
                    .single();
                
                if (error || !data || !data.data) {
                    _error('[ARENA JOIN] Room not found:', error);
                    return naAlert('Partie introuvable');
                }
                
                _log('[ARENA JOIN] Room found:', data.data);
                
                // Save local identifiers
                const myName = gameState.playerName;
                const myCode = gameState.roomCode;
                
                // Load game state
                Object.assign(gameState, data.data);
                
                // Restore local identifiers
                gameState.playerName = myName;
                gameState.roomCode = myCode;
                gameState.isHost = false; // NOT host
                
                _log('[ARENA JOIN] GameMode:', gameState.gameMode, 'Players:', gameState.players.length);
                
                // Check if it's an arena room
                if (gameState.gameMode !== 'arena') {
                    return naAlert('Ce n\'est pas une room Arena');
                }
                
                // Check if room is full
                if (gameState.players && gameState.players.length >= 4) {

        function formatWeaponDesc(raw) {

            const lines = raw.split('\n');
            let html = '';
            let prevWasBlank = false;
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) { prevWasBlank = true; continue; }
                if (prevWasBlank && html) html += '<div style="height:10px"></div>';
                prevWasBlank = false;
                if (line.startsWith('•') || line.startsWith('●')) {
                    html += '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:6px"><span style="color:#a5b4fc;flex-shrink:0;margin-top:1px">' + line[0] + '</span><span>' + line.slice(1).trim() + '</span></div>';
                } else if (line.startsWith('-')) {
                    html += '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:4px"><span style="color:#d1d5db;flex-shrink:0">—</span><span>' + line.slice(1).trim() + '</span></div>';
                } else if (line.startsWith('[') || line.startsWith('(')) {
                    html += '<div style="margin-bottom:5px;color:#fbbf24;font-style:italic">' + line + '</div>';
                } else {
                    html += '<div style="margin-bottom:5px">' + line + '</div>';

            }
            return html;

                gameState.arenaState.turnPhase = 'action';
                let aoeMsg = '🌀 ' + w.name.toUpperCase() + '\n\n';

        // ══════════════════════════════════════════════════════════════════════

        window.kazekageSetMode = async (mode) => {

            myPlayer._kazekage.defElem = elem;
            await saveGame(); render();

        // ─── RÉPONSE DU DÉFENSEUR : accepter ou refuser le contre ───────────────
        window.weaponCounterAccept = async () => {
            document.querySelectorAll('.na-overlay,[data-popup],[data-weapon-counter]').forEach(el => el.remove());
            const myPlayer = gameState.arenaState.players.find(p => p.name === gameState.playerName);
            const pending = myPlayer._weaponCounterPending;
            if (!pending) return;
            myPlayer._weaponCounterPending = null;
            window._weaponCounterResolving = true; // Bloquer re-création popup pendant saveGame

            const attacker = gameState.arenaState.players.find(p => p.name === pending.attackerName);
            if (!attacker) return;

            const atkDmg  = pending.weaponDamage;    // dégâts arme attaquant
            // ── Calculer defDmg réel selon effets du défenseur ──
            let defDmg = myPlayer.weapon.damage;
            // SAMEHADA : +1 si possède Suiton
            if (myPlayer.weapon.effect === 'samehada' && (myPlayer.chakraNatures || []).includes('suiton')) {
                defDmg += 1;
            }
            // KUSANAGI : boost permanent
            if (myPlayer.weapon.effect === 'kusanagi' && myPlayer._kusanagiPermanentBoost) {
                defDmg = 4;
            }
            // KIBA : +1 si 2+ cartes Raiton jouées depuis dernier usage
            if (myPlayer.weapon.effect === 'kiba') {
                const _kRp = myPlayer._kibaRaitonPlayed || 0;
                if (_kRp >= 2) defDmg += 1;
                if (myPlayer._kibaRaitonIncomingBonus) defDmg += 1;
            }
            // HIRAMEKAREI : +2 ou +4 si décharge active
            if (myPlayer.weapon.effect === 'hiramekarei' && window._hiramekareiDischarge) {
                const _hDef = window._hiramekareiDischarge;
                defDmg += (_hDef === myPlayer._hiramekareiStrongElem) ? 4 : 2;
            }

            // Défenseur consomme son CD arme
            myPlayer.weaponCooldown = myPlayer.weapon.cooldown;

            let finalDmgOnDef = 0;
            let resultMsg = '';

            if (defDmg === atkDmg) {
                // Égalité → annulation totale, 0 dégât des deux côtés
                resultMsg = 'Annulation totale ! Aucun degat des deux cotes.'
                    + '\n\n(' + myPlayer.weapon.name + ' [' + defDmg + '] neutralise ' + pending.weaponName + ' [' + atkDmg + '])';
            } else if (defDmg > atkDmg) {
                // Arme défenseur > arme attaquant → l'excédent blesse l'attaquant
                const exces = defDmg - atkDmg;
                attacker.hp = Math.max(0, attacker.hp - exces);
                if (attacker.hp <= 0) attacker.eliminated = true;
                resultMsg = 'Contre superieur !'
                    + '\n\n' + myPlayer.weapon.name + ' [' + defDmg + '] - ' + pending.weaponName + ' [' + atkDmg + '] = ' + exces + ' degat(s) sur ' + attacker.name
                    + '\n' + attacker.name + ' : ' + attacker.hp + ' HP restants';
            } else {
                // Arme défenseur < arme attaquant → réduit les dégâts de sa propre valeur
                const reste = atkDmg - defDmg;
                myPlayer.hp = Math.max(0, myPlayer.hp - reste);
                if (myPlayer.hp <= 0) myPlayer.eliminated = true;
                resultMsg = 'Contre partiel !'
                    + '\n\n' + pending.weaponName + ' [' + atkDmg + '] - ' + myPlayer.weapon.name + ' [' + defDmg + '] = ' + reste + ' degat(s) sur ' + myPlayer.name
                    + '\n' + myPlayer.name + ' : ' + myPlayer.hp + ' HP restants';
            }

            // ── Effets offensifs de l'arme attaquante si ATTAQUANT GAGNE (atkDmg > defDmg) ──
            if (atkDmg > defDmg && attacker.weapon) {
                const _aw = attacker.weapon;
                // SENBON : pioche 2 cartes
                if (_aw.effect === 'senbon') {
                    attacker._senbonPendingDraw = 2;
                    _log('[SENBON ACCEPT WIN] ' + attacker.name + ' : 2 piocheS pendantes');
                }
                // SHURIKEN drawCard
                if (_aw.drawCard && gameState.arenaState.deck.length > 0 && !attacker.cannotDraw) {
                    const _shuDraw = gameState.arenaState.deck.pop();
                    if (attacker.hand.length < 7) {
                        attacker.hand.push(_shuDraw);
                    } else {
                        attacker.hand.push(_shuDraw);
                        attacker._pendingOverflowCard = _shuDraw;
                    }
                    _log('[SHURIKEN DRAW ACCEPT WIN] ' + attacker.name + ' pioche : ' + _shuDraw.name);
                }
                // SHIBUKI : détruit 1 carte + révèle 1 carte
                if (_aw.effect === 'shibuki' && myPlayer.hand && myPlayer.hand.length > 0) {
                    const _sIdx = Math.floor(Math.random() * myPlayer.hand.length);
                    const _destroyed = myPlayer.hand.splice(_sIdx, 1)[0];
                    attacker._shibukiDestroyedCard = _destroyed.name;
                    attacker._shibukiTriggered = true;
                    _log('[SHIBUKI ACCEPT WIN] Carte détruite : ' + _destroyed.name);
                    if (myPlayer.hand.length > 0) {
                        const _rIdx = Math.floor(Math.random() * myPlayer.hand.length);
                        attacker._shibukiRevealedCard = myPlayer.hand[_rIdx].name;
                    } else {
                        attacker._shibukiRevealedCard = null;
                    }
                    // Kasumi bonus
                    if (gameState.arenaState.kasumiActive) {
                        const _kasTargets = gameState.arenaState.players.filter(p => p.name !== attacker.name && p.hp > 0);
                        if (_kasTargets.length > 0) {
                            const _kasT = _kasTargets[Math.floor(Math.random() * _kasTargets.length)];
                            _kasT.hp = Math.max(0, _kasT.hp - 1);
                            if (_kasT.hp <= 0) _kasT.eliminated = true;
                            attacker._shibukiKasumiBonus = _kasT.name;
                            _log('[SHIBUKI+KASUMI ACCEPT WIN] +1 dégât sur ' + _kasT.name);
                        }
                    }
                }
                // NUIBARI : scellement
                if (_aw.effect === 'nuibari') {
                    attacker._nuibariHit = myPlayer.name;
                }
                // SAMEHADA : +1 dégât Suiton attaquant + pioche/défausse selon chakra défenseur
                if (_aw.effect === 'samehada') {
                    const _atkHasSuiton = attacker.chakraNatures?.includes('suiton');
                    if (_atkHasSuiton) {
                        myPlayer.hp = Math.max(0, myPlayer.hp - 1);
                        if (myPlayer.hp <= 0) myPlayer.eliminated = true;
                        _log('[SAMEHADA ACCEPT WIN] +1 dégât Suiton attaquant');
                    }
                    const _tHasSuiton = myPlayer.chakraNatures?.includes('suiton');
                    const _tHasRaiton = myPlayer.chakraNatures?.includes('raiton');
                    if (_tHasSuiton && _tHasRaiton) {
                        const _elemIdx = attacker.hand.findIndex(c => c.element && c.element !== 'none');
                        if (_elemIdx !== -1) { const _d = attacker.hand.splice(_elemIdx,1)[0]; attacker._samehada_result = 'discard:'+_d.name; }
                        else attacker._samehada_result = 'discard:none';
                    } else if (_tHasSuiton) {
                        const _sc = (ARENA_CARDS.techniques||[]).filter(c=>c.element==='suiton');
                        if (_sc.length>0&&attacker.hand.length<7){attacker.hand.push({..._sc[Math.floor(Math.random()*_sc.length)]});attacker._samehada_result='draw:suiton';}
                    } else if (_tHasRaiton) {
                        const _rc = (ARENA_CARDS.techniques||[]).filter(c=>c.element==='raiton');
                        if (_rc.length>0&&attacker.hand.length<7){attacker.hand.push({..._rc[Math.floor(Math.random()*_rc.length)]});attacker._samehada_result='draw:raiton';}
                    }
                }
                // KUSARIGAMA : poison
                if (_aw.effect === 'kusarigama' && !myPlayer._kusarigamaPoison) {
                    myPlayer._kusarigamaPoison = true;
                    myPlayer._kusarigamaPoisonTurns = 10;
                    myPlayer._kusarigamaPoisonSource = attacker.name;
                    _log('[KUSARIGAMA ACCEPT WIN] ' + myPlayer.name + ' empoisonné');
                }
                // KIBA : bonus permanent
                if (_aw.effect === 'kiba') {
                    const _rp = attacker._kibaRaitonPlayed || 0;
                    const _kb = _rp >= 2 ? 1 : 0;
                    if (_kb > 0) { myPlayer.hp = Math.max(0, myPlayer.hp - _kb); if(myPlayer.hp<=0)myPlayer.eliminated=true; }
                    if (attacker._kibaRaitonIncomingBonus) {
                        myPlayer.hp = Math.max(0, myPlayer.hp - 1); if(myPlayer.hp<=0)myPlayer.eliminated=true;
                        attacker._kibaRaitonIncomingBonus = false;
                    }
                }
                // HIRAMEKAREI : décharge si disponible (attaquant gagne)
                // Dégâts déjà dans pending.weaponDamage (via _effectiveAtkDmg) — on fait uniquement le reset
                if (_aw.effect === 'hiramekarei' && (window._hiramekareiDischarge || pending.hiramekareiDischarge)) {
                    const _de = window._hiramekareiDischarge || pending.hiramekareiDischarge;
                    window._hiramekareiDischarge = null;
                    if(!attacker._hiramekareiStorage) attacker._hiramekareiStorage={};
                    attacker._hiramekareiStorage[_de]=0;
                }
            }

            // Déterminer quel GIF de résultat afficher
            let clashResultType, clashResultGif, clashResultAdvantage;
            if (defDmg === atkDmg) {
                clashResultType = 'weapon_counter_nul';
                clashResultGif  = WEAPON_CLASH_GIFS.counterNul;
                clashResultAdvantage = myPlayer.weapon.name + ' [' + defDmg + '] = ' + pending.weaponName + ' [' + atkDmg + '] — Annulation totale';
            } else if (defDmg > atkDmg) {
                clashResultType = 'weapon_counter_success';
                clashResultGif  = WEAPON_CLASH_GIFS.counterSuccess;
                clashResultAdvantage = myPlayer.weapon.name + ' [' + defDmg + '] > ' + pending.weaponName + ' [' + atkDmg + '] — ' + (defDmg - atkDmg) + ' dégât(s) sur ' + attacker.name;
            } else {
                clashResultType = 'weapon_counter_failed';
                clashResultGif  = WEAPON_CLASH_GIFS.counterFailed;
                clashResultAdvantage = pending.weaponName + ' [' + atkDmg + '] > ' + myPlayer.weapon.name + ' [' + defDmg + '] — ' + (atkDmg - defDmg) + ' dégât(s) sur ' + myPlayer.name;
            }

            // Karasu C : géré dans selectCardAction (clash carte offensive en contre)

            if (!gameState.arenaState.currentClash) gameState.arenaState.currentClash = { events: [], playedBy: [] };
            gameState.arenaState.currentClash.events.push({
                type: clashResultType,
                attacker: attacker.name,
                defender: myPlayer.name,
                name: myPlayer.weapon.name,
                gif: clashResultGif,
                advantage: clashResultAdvantage
            });

            // ── KUBIKIRIBOCHO : heal si l'attaquant a quand même infligé des dégâts (contre partiel) ──
            if (attacker.weapon && attacker.weapon.effect === 'kubikiribocho' && defDmg < atkDmg) {
                // L'attaquant a infligé (atkDmg - defDmg) dégâts via contre partiel
                // Heal basé sur le HP de la cible AVANT le coup
                const hpCheck = myPlayer.hp + (atkDmg - defDmg);
                let heal = 0;
                if (hpCheck > 10) heal = 1;
                else heal = 2;
                attacker.hp = Math.min(attacker.maxHp || 20, attacker.hp + heal);
                _log('[KUBIKIRIBOCHO COUNTER] ' + attacker.name + ' récupère ' + heal + ' HP');
            }
            // ── KUBIKIRIBOCHO pour le défenseur : heal si leur contre dépasse l'attaquant ──
            if (myPlayer.weapon && myPlayer.weapon.effect === 'kubikiribocho' && defDmg > atkDmg) {
                const hpCheck = attacker.hp + (defDmg - atkDmg);
                const heal = hpCheck > 10 ? 1 : 2;
                myPlayer.hp = Math.min(myPlayer.maxHp || 20, myPlayer.hp + heal);
                _log('[KUBIKIRIBOCHO DEF COUNTER] ' + myPlayer.name + ' récupère ' + heal + ' HP');
                // ── KAZEKAGE ATTAQUE : +1 bonus si contre réussi ──
                if (myPlayer._kazekage?.mode === 'attack') {
                    myPlayer._kazekage.bonus = (myPlayer._kazekage.bonus || 0) + 1;
                    _log('[KAZEKAGE ATK] +1 bonus accumulé → total ' + myPlayer._kazekage.bonus);
                }
                // ── KAZEKAGE DÉFENSE : +1 HP sur contre défensif réussi ──
                if (myPlayer._kazekage?.mode === 'defense') {
                    myPlayer.hp = Math.min(myPlayer.maxHp || 20, myPlayer.hp + 1);
                    _log('[KAZEKAGE DEF] +1 HP sur contre défensif réussi');
                }
            }

            // ── Effets défenseur AVANT saveGame (évite écrasement par attaquant) ──
            // SHIBUKI défenseur : détruit 1 carte attaquant + révèle 1 autre
            if (defDmg > atkDmg && myPlayer.weapon?.effect === 'shibuki' && attacker.hand && attacker.hand.length > 0) {
                const _shibDIdx = Math.floor(Math.random() * attacker.hand.length);
                const _shibDestroyed = attacker.hand.splice(_shibDIdx, 1)[0];
                myPlayer._shibukiDestroyedCard = _shibDestroyed.name;
                myPlayer._shibukiTriggered = true;
                if (attacker.hand.length > 0) {
                    myPlayer._shibukiRevealedCard = attacker.hand[Math.floor(Math.random() * attacker.hand.length)].name;
                } else {
                    myPlayer._shibukiRevealedCard = null;
                }
                _log('[SHIBUKI DEF WIN PRE] Carte détruite : ' + _shibDestroyed.name);

            const noCounterCardsList = ['Coup de poing','Coup de pied','Suirô no Jutsu','Amaterasu','Tsukuyomi','Kotoamatsukami','Jûken','Yasogami Kûgeki','Shishi Rendan','Omote Renge'];

            popup.setAttribute('data-popup','1');

                    // Header with GIF

        };
        
        // ============================================
        //      PARTIE 3.3: CLASH ÉLÉMENTAIRE

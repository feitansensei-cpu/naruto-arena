    <script>
    // Force cache bust : désinscrire tous les Service Workers et vider les caches
    (async function() {
        if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            for (const reg of regs) { await reg.unregister(); }
        }
        if ('caches' in window) {
            const keys = await caches.keys();
            for (const key of keys) { await caches.delete(key); }
        }
    })();
    </script>

    <style id="popup-design-system">

        /* ── Carte popup ── */

            background: linear-gradient(160deg, #0d0d14 0%, #13131e 100%);

            border-radius: 18px;
            padding: 32px 28px 24px;

        /* ── Titre ── */

        /* ── Boutons ── */

        function naAlert(msg, opts) {
            return new Promise(function(resolve) {
                var old = document.getElementById('na-alert-popup');
                if (old) old.remove();
                var o = opts || {};
                var btnLabel = o.btn || 'OK';
                var accentGrad = o.gradient || 'linear-gradient(90deg,#6366f1,#4f46e5)';
                var htmlMsg = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
                var overlay = document.createElement('div');
                overlay.id = 'na-alert-popup';
                overlay.className = 'na-overlay';
                overlay.style.zIndex = '99999';
                // Séparer première ligne (titre) du reste (corps)
                var parts = htmlMsg.split('<br>');
                var titleLine = parts[0];
                var bodyLines = parts.slice(1).join('<br>');
                var titleHtml = '<p style="font-size:17px;font-weight:800;letter-spacing:1.5px;color:#E6EAF2;text-align:center;margin-bottom:' + (bodyLines ? '10px' : '4px') + ';text-transform:uppercase">' + titleLine + '</p>';
                var bodyHtml = bodyLines ? '<div style="font-size:15px;color:#c9a84c;line-height:1.85;text-align:center;letter-spacing:0.2px;padding:0 8px">' + bodyLines + '</div>' : '';
                overlay.innerHTML = '<div class="na-card" style="margin:16px;cursor:default;display:flex;flex-direction:column;align-items:center" onclick="event.stopPropagation()"><div class="na-card-accent" style="background:' + accentGrad + ';width:100%;align-self:stretch"></div>' + titleHtml + '<div class="na-sep"></div>' + (bodyLines ? '<div style="flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:12px 0 20px">' + bodyHtml + '</div>' : '<div style="flex:1"></div>') + '<button id="na-alert-ok-btn" class="na-btn na-btn-primary" style="margin-top:4px;margin-bottom:0;letter-spacing:2px;font-size:11px;align-self:stretch">' + btnLabel + '</button></div>';
                document.body.appendChild(overlay);
                function close() { overlay.remove(); resolve(); }
                var btn = document.getElementById('na-alert-ok-btn');
                if (btn) btn.addEventListener('click', close);
                overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
                if (btn) btn.focus();
                document.addEventListener('keydown', function onKey(e) { if (e.key === 'Enter' || e.key === 'Escape') { document.removeEventListener('keydown', onKey); close(); } });
            });
        }

        async function _processPollData(code) {

                    if (actionInProgress) {
                        _log('[POLL] 🔒 Action en cours - poll bloqué');

                    if (actionInProgress && data?.data?._savedAt) {
                        const remoteTs = new Date(data.data._savedAt).getTime();
                        const localTs  = new Date(gameState._savedAt || 0).getTime();
                        if (remoteTs >= localTs) { setActionInProgress(false); }
                    }
                    _pollFailCount = 0;
                    if (data && data.data) {
                        if (!data.data.players || !Array.isArray(data.data.players) || data.data.players.length === 0) {
                            _error('[POLL] Refusing to load corrupted data');
                            return;
                        }
                        // PATCH CHAT : synchroniser les messages
                        if (typeof syncChatFromGameState === 'function') syncChatFromGameState(data.data);
                        
                        // Ne skip que si on vient d'attaquer nous-mêmes (actionInProgress récent)
                        // Ne JAMAIS skip si on est le défenseur - on a besoin de lire les events
                        const remoteTs = new Date(data.data._savedAt || data.updated_at || 0).getTime();
                        const localTs  = new Date(gameState._savedAt || 0).getTime();
                        const isAttacker = data.data._lastAttacker === gameState.playerName;
                        if (localTs > remoteTs && isAttacker) {
                            _log('[POLL] Skipping - attaquant local plus récent');
                            return;
                        }
                        // GUARD CRITIQUE : si endTurn est en cours, ignorer TOUT merge
                        // Le merge pendant endTurn peut écraser le currentTurn incrémenté → double pioche
                        if (window._endingTurn) {
                            _log('[POLL] ⛔ Merge bloqué — _endingTurn=true');
                            return;
                        }
                        
                        const myName = gameState.playerName;
                        const myCode = gameState.roomCode;
                        const myHost = gameState.isHost;
                        
                        // Sauvegarder l'état du joueur local avant merge
                        const localArenaState = gameState.arenaState ? JSON.parse(JSON.stringify(gameState.arenaState)) : null;
                        const localSavedAt = gameState._savedAt || 0;
                        
                        // Sauvegarder _kotoaFictifHp avant que Object.assign l'écrase
                        const savedKotoaFictif = gameState.arenaState?._kotoaFictifHp;

                        if (gameState.screen === 'arena-victory') {
                            _log('[POLL] Screen=arena-victory → merge ignoré');

                        }
                        Object.assign(gameState, data.data);

                        // Nettoyer _edoTurnBonus si le tour a changé
                        const _prevTurn = gameState.arenaState?.currentTurn;

                        if (gameState.arenaState?.players?.length > 0) {

                            if (gameState.arenaState.currentTurn < 0 || isNaN(gameState.arenaState.currentTurn)) {
                                _warn('[POLL GUARD] currentTurn invalide, reset à 0');
                                gameState.arenaState.currentTurn = 0;
                            }
                        }
                        // Restaurer _kotoaFictifHp (donnée purement locale, jamais dans Supabase)
                        if (savedKotoaFictif && Object.keys(savedKotoaFictif).length > 0) {
                            if (!gameState.arenaState) gameState.arenaState = {};
                            gameState.arenaState._kotoaFictifHp = savedKotoaFictif;
                        }
                        
                        // Si notre état local était plus récent, restaurer les données du joueur local
                        _log('[POLL] 🔄 Merge - localSavedAt:', localSavedAt, '| remoteSavedAt:', data.data._savedAt);
                        if (localArenaState && localSavedAt) {
                            const remoteSavedAt = data.data._savedAt || 0;
                            _log('[POLL] ⏱ local:', new Date(localSavedAt).getTime(), '> remote:', new Date(remoteSavedAt).getTime(), '?', new Date(localSavedAt).getTime() > new Date(remoteSavedAt).getTime());
                            if (new Date(localSavedAt).getTime() > new Date(remoteSavedAt).getTime()) {
                                // Merge sélectif : restaurer uniquement les champs locaux SAFE
                                // NE PAS écraser les effets imposés par les adversaires (kotoamatsukami, tsukuyomi...)
                                const localMyPlayer = localArenaState.players.find(p => p.name === myName);
                                const remoteMyPlayer = gameState.arenaState?.players?.find(p => p.name === myName);
                                if (localMyPlayer && remoteMyPlayer && gameState.arenaState) {
                                    // IMPORTANT : on ne restaure QUE les données propres au joueur local
                                    // currentTurn et turnPhase sont des données GLOBALES de partie
                                    // → toujours prendre la version Supabase pour éviter désynchronisation
                                    const safeFields = ['hand', 'counterCard', 'counterActive', 'avatar',
                                        'hasDiscardedThisTurn', 'hasDrawnThisTurn', 'usedTechniques', 'powerCooldown', 'powerUsesLeft', '_weaponSelected', '_chakraConfirmed', '_bombSmokeTurns', '_bombFlashFakeName', 'weaponCooldown', '_weaponCounterPending'];
                                    for (const f of safeFields) {
                                        if (localMyPlayer[f] !== undefined) remoteMyPlayer[f] = localMyPlayer[f];
                                    }
                                    // NE PAS restaurer turnPhase ni currentTurn depuis le local
                                    // Ce sont des vérités globales dictées par Supabase
                                }
                                _log('[POLL] Merge sélectif - effets adversaires conservés, currentTurn Supabase conservé');
                            }
                        }
                        
                        // Restaurer _kotoaFictifHp après le merge (données purement locales, jamais dans Supabase)
                        if (localArenaState?._kotoaFictifHp && Object.keys(localArenaState._kotoaFictifHp).length > 0) {
                            gameState.arenaState._kotoaFictifHp = localArenaState._kotoaFictifHp;

                        const myName2 = gameState.playerName;
                        const alreadyPlayed = clash && Array.isArray(clash.playedBy) && clash.playedBy.includes(myName2);

                            // Jouer les events en séquence (synchrone via await)

                                for (const ev of clash.events) {

                                    if (ev.type === 'info' && ev.advantage && ev.advantage.toLowerCase().includes('neutralis')) continue;

                            // Nettoyer le clash dans Supabase
                            gameState.arenaState.currentClash = null;
                            // Ne pas sauvegarder si on est en écran victoire (évite le rollback HP du perdant)
                            if (gameState.screen !== 'arena-victory') {
                                await saveGame();
                            }
                            // Reprendre le poll
                            if (gameState.screen !== 'arena-victory') {
                                startPolling(myCode);
                            } else {
                                render(); // Afficher l'écran de victoire pour le perdant
                            }
                        } else {
                            // HOST : vérifier si tous ont confirmé chakra → passer à weapon
                            if (gameState.isHost && gameState.screen === 'arena-chakra-selection') {
                                const allChakraConfirmed = gameState.arenaState.players.every(p => p._chakraConfirmed);
                                if (allChakraConfirmed) {

                                    if (!alreadyDealt) {

                            if (gameState.isHost && gameState.screen === 'arena-weapon-selection') {
                                const allWeaponSelected = gameState.arenaState.players.every(p => p._weaponSelected);
                                if (allWeaponSelected) {
                                    const alreadyStarted = gameState.arenaState.screen === 'arena-game';
                                    if (!alreadyStarted) {
                                        gameState.screen = 'arena-game';

                                        localStorage.setItem('na_session_player', gameState.playerName);

                            }

                            // Si le tour a changé et c'est maintenant mon tour → reset flag de pioche local
                            const _currentPlayerNow = gameState.arenaState?.players?.[gameState.arenaState?.currentTurn % gameState.arenaState?.players?.length];
                            const _newTurn = gameState.arenaState?.currentTurn;
                            if (_currentPlayerNow && _currentPlayerNow.name === gameState.playerName) {

                                if (_newTurn !== window._lastKnownTurn) {

                            if (!window._endingTurn) render();

                    // PATCH TABLETTE : overlay dès 3 échecs, reset seulement à 8
                    if (typeof showReconnectOverlay === 'function' && _pollFailCount >= 3) {

                        setTimeout(function() {

                        }, 2000);
                    }
            }

        async function startPolling(code) {
            // Arrêter l'ancien channel Realtime
            if (_realtimeChannel) {
                try { db.removeChannel(_realtimeChannel); } catch(e) {}
                _realtimeChannel = null;
            }
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

            // Fallback poll léger toutes les 10s (sécurité si Realtime déconnecté)
            pollInterval = setInterval(async () => {
                if (!_realtimeChannel || _realtimeChannel.state !== 'joined') {
                    _warn('[REALTIME] Fallback poll déclenché');
                    await _processPollData(code);
                }
            }, 10000);

            // Supabase Realtime : push instantané à chaque changement en base
            _realtimeChannel = db
                .channel('game-' + code)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'games',
                    filter: 'room_code=eq.' + code
                }, async () => {
                    _log('[REALTIME] 📡 Changement détecté');
                    await _processPollData(code);
                })
                .subscribe((status) => {
                    _log('[REALTIME] Status:', status);
                });

            // Chargement initial immédiat
            await _processPollData(code);
        }

        function stopPolling() {
            if (_realtimeChannel) {
                try { db.removeChannel(_realtimeChannel); } catch(e) {}
                _realtimeChannel = null;

            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        // --- Wake Lock : empêche la tablette de s'endormir ---
        let _wakeLock = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    _wakeLock = await navigator.wakeLock.request('screen');
                    _log('[WAKELOCK] ✅ Écran maintenu actif');
                    _wakeLock.addEventListener('release', function() {

                        _wakeLock = null;
                    });
                } catch(e) {

            }
        }
        // Réacquérir le wake lock si la page redevient visible

        function escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            if (typeof gameState === 'undefined' || !gameState.roomCode) return naAlert('Pas en partie !');
            input.value = '';
            const msg = { author: gameState.playerName, text: text, ts: Date.now() };
            _chatMessages.push(msg);
            renderChatMessages();
            // Sauvegarder dans Supabase via gameState
            try {
                if (!gameState._chat) gameState._chat = [];
                gameState._chat.push(msg);
                // Garder seulement les 50 derniers messages
                if (gameState._chat.length > 50) gameState._chat = gameState._chat.slice(-50);
                if (typeof saveGame === 'function') await saveGame();
            } catch(e) { _warn('[CHAT] Save error:', e); }
        }

        // Lire les messages chat depuis gameState lors du poll
        function syncChatFromGameState(gs) {
            if (!gs || !gs._chat || !Array.isArray(gs._chat)) return;
            const newMsgs = gs._chat.filter(function(m) { return m.ts > _chatLastTs; });
            if (newMsgs.length === 0) return;
            _chatLastTs = Math.max(...gs._chat.map(function(m){ return m.ts; }));
            newMsgs.forEach(function(m) {
                const alreadyExists = _chatMessages.some(function(x){ return x.ts === m.ts && x.author === m.author; });
                if (!alreadyExists) {
                    _chatMessages.push(m);
                    const isMe = typeof gameState !== 'undefined' && m.author === gameState.playerName;
                    if (!isMe) {
                        if (!_chatOpen) {
                            _chatUnread++;
                            updateChatBadge();
                        }
                        // Toast visible même si chat ouvert (pour ne pas rater les messages)
                        if (typeof showChatToast === 'function') showChatToast(m.author, m.text);
                    }
                }
            });
            _chatMessages.sort(function(a,b){ return a.ts - b.ts; });
            if (_chatOpen) renderChatMessages();
        }

        async function saveGame() {
            if (!gameState.roomCode) return;
            
            const now = new Date().toISOString();
            gameState._savedAt = now; // marquer le timestamp local
            
            const { error } = await db
                .from('games')
                .upsert({ 
                    room_code: gameState.roomCode, 
                    data: gameState,
                    updated_at: now
                });
            
            if (error) {
                _error('[SAVE] ❌ Erreur:', error);

        async function loadGame(code) {
            try {
                const { data } = await db.from('games').select('data').eq('room_code', code).single();
                if (data && data.data) {
                    // VALIDATION CRITIQUE
                    if (!data.data.players || !Array.isArray(data.data.players)) {
                        _error('[LOAD] Invalid data from DB - players missing!', data.data);
                        return; // NE PAS ÉCRASER
                    }
                    
                    // Même protection timestamp pour loadGame
                    const remoteTs2 = new Date(data.data._savedAt || 0).getTime();
                    const localTs2  = new Date(gameState._savedAt || 0).getTime();
                    if (localTs2 > remoteTs2) {
                        _log('[LOAD] Skipping stale remote data');
                        return;
                    }
                    const myName = gameState.playerName;
                    const myCode = gameState.roomCode;
                    Object.assign(gameState, data.data);
                    gameState.playerName = myName;
                    gameState.roomCode = myCode;
                    render();
                }
            } catch (err) {
                _error('Load error:', err);
            }
        }

        async function usePower() {
            const me = gameState.players.find(p => p.name === gameState.playerName);
            if (!me || !me.power || me.powerUsed) return naAlert('Pouvoir déjà utilisé ou non disponible');
            
            const powerName = me.power.name;
            
            // ENCHÈRE SEAL - Bloquer un joueur
            if (powerName === 'Enchère Seal') {
                const otherPlayers = gameState.players.filter(p => p.name !== gameState.playerName);
                const target = prompt(`Choisir un joueur à bloquer pour 1 enchère:\n${otherPlayers.map((p, i) => `${i + 1}. ${p.name}`).join('\n')}\n\nEntrez le numéro:`);
                
                if (target && otherPlayers[parseInt(target) - 1]) {
                    const blocked = otherPlayers[parseInt(target) - 1];
                    gameState.blockedPlayers.push(blocked.name);
                    
                    gameState.powerEffects.push({
                        user: gameState.playerName,
                        power: powerName,
                        target: blocked.name,
                        description: `${blocked.name} est bloqué pour cette enchère`
                    });
                    
                    naAlert(`✅ ${blocked.name} ne pourra pas enchérir sur le prochain personnage !`);
                } else {
                    return naAlert('Annulé');
                }
            }
            
            // ARRIVEDERCI - Bannir personnage (AVANT première mise)
            else if (powerName === 'Arrivederci') {
                if (gameState.screen !== 'auction') return naAlert('Utilisable uniquement pendant une enchère !');
                if (gameState.currentBid > 0) return naAlert('❌ Trop tard ! Une mise a déjà été placée. Utilisable uniquement AVANT la première mise.');
                
                if (confirm('Bannir le personnage actuel et en obtenir un nouveau (HORS deck initial) ?')) {
                    const banned = gameState.characters[gameState.currentCharIndex];
                    const allChars = [...CHARACTERS_DB[gameState.theme]];
                    // IMPORTANT: Nouveau perso = PAS dans le deck initial
                    const available = allChars.filter(c => !gameState.characters.includes(c));
                    
                    if (available.length > 0) {
                        const newChar = available[Math.floor(Math.random() * available.length)];
                        gameState.characters[gameState.currentCharIndex] = newChar;
                        
                        gameState.powerEffects.push({
                            user: gameState.playerName,
                            power: powerName,
                            description: `${banned} banni → ${newChar} (hors deck)`
                        });
                        
                        naAlert(`✅ ${banned} a été banni du deck !\n${newChar} le remplace (personnage HORS deck initial) !`);
                    } else {
                        return naAlert('❌ Aucun personnage disponible hors deck !'); // Ne pas consommer le pouvoir
                    }
                }
            }
            
            // POWER TRANSFERT - Sceller technique (SEULEMENT au vote)
            else if (powerName === 'Power Transfert') {
                if (gameState.screen !== 'vote') {
                    return naAlert('⚠️ Power Transfert ne peut être utilisé que pendant la phase de VOTE !');
                }
                
                const otherPlayers = gameState.players.filter(p => p.name !== gameState.playerName && p.team.length > 0);
                if (otherPlayers.length === 0) return naAlert('Aucun joueur avec une équipe !');
                
                const targetPlayerIdx = prompt(`Choisir un joueur:\n${otherPlayers.map((p, i) => `${i + 1}. ${p.name}`).join('\n')}\n\nNuméro:`);
                if (!targetPlayerIdx) return naAlert('Annulé');
                
                const targetPlayer = otherPlayers[parseInt(targetPlayerIdx) - 1];
                if (!targetPlayer) return naAlert('Annulé');
                
                const charIdx = prompt(`Choisir un personnage de ${targetPlayer.name}:\n${targetPlayer.team.map((c, i) => `${i + 1}. ${c}`).join('\n')}\n\nNuméro:`);
                if (!charIdx) return naAlert('Annulé');
                
                const targetChar = targetPlayer.team[parseInt(charIdx) - 1];
                if (!targetChar) return naAlert('Annulé');
                
                const technique = prompt(`Quelle technique de ${targetChar} voulez-vous sceller ?`);
                if (!technique) return naAlert('Annulé');
                
                gameState.powerEffects.push({
                    user: gameState.playerName,
                    power: powerName,
                    target: `${targetPlayer.name} - ${targetChar}`,
                    description: `Technique scellée: ${technique}`
                });
                
                naAlert(`✅ ${technique} de ${targetChar} (${targetPlayer.name}) est scellée !`);
            }
            
            // CONCEPT SEAL - Bannir concept pendant 3 tours
            else if (powerName === 'Concept Seal') {
                if (gameState.screen !== 'auction') {
                    return naAlert('⚠️ Concept Seal doit être utilisé AVANT la présentation d\'un personnage !');
                }
                
                const concept = prompt('Quel concept voulez-vous bannir ? (ex: Katana, Feu, Cheveux blonds, etc.)');
                if (!concept || !concept.trim()) return naAlert('Annulé');
                
                const otherPlayers = gameState.players.filter(p => p.name !== gameState.playerName);
                const targetIdx = prompt(`Cibler quel joueur:\n${otherPlayers.map((p, i) => `${i + 1}. ${p.name}`).join('\n')}\n\nNuméro:`);
                if (!targetIdx) return naAlert('Annulé');
                
                const target = otherPlayers[parseInt(targetIdx) - 1];
                if (!target) return naAlert('Annulé');
                
                gameState.powerEffects.push({
                    user: gameState.playerName,
                    power: powerName,
                    target: target.name,
                    concept: concept.trim(),
                    turnsLeft: 3,
                    startTurn: gameState.currentCharIndex,
                    description: `"${concept.trim()}" banni pendant 3 tours`
                });
                
                naAlert(`✅ ${target.name} ne peut pas acheter de personnages avec "${concept.trim()}" pendant 3 tours !\n\n⚠️ Tous les joueurs sont informés de cette restriction.`);
            }
            
            // ARC NO PRIME - Taguer SECRÈTEMENT le perso en enchère (révélé au vote)
            else if (powerName === 'Arc no Prime') {
                if (gameState.screen !== 'auction') return naAlert('Utilisable uniquement pendant une enchère !');
                
                const currentChar = gameState.characters[gameState.currentCharIndex];
                const arc = prompt(`Taguer SECRÈTEMENT "${currentChar}" avec quel arc ?\n(ex: Alabasta, Enies Lobby, Marineford, etc.)\n\n⚠️ L'arc sera révélé au vote !`);
                if (!arc) return naAlert('Annulé');
                
                // IMPORTANT: Sauvegarder dans powerEffects mais PAS encore dans le nom du perso
                // On le révélera au moment du vote
                gameState.powerEffects.push({
                    user: gameState.playerName,
                    power: powerName,
                    target: currentChar,
                    targetCharIndex: gameState.currentCharIndex,
                    arc: arc,
                    description: `Arc secret: ${arc} (révélé au vote)`,
                    revealed: false
                });
                
                naAlert(`✅ ${currentChar} est secrètement tagué avec l'arc "${arc}" !\n\n🤫 Les autres joueurs ne le voient PAS encore.\n📢 L'arc sera révélé pendant le vote.`);
            }
            
            // SECRET TERMS (déjà configuré lors de la sélection)
            else if (powerName === 'Secret Terms') {
                const me = gameState.players.find(p => p.name === gameState.playerName);
                if (me && me.secretCondition) {
                    naAlert(`✅ Secret Terms !\n\nVotre 2ème condition: "${me.secretCondition}"\n\nElle sera révélée pendant le vote.`);
                } else {
                    return naAlert('❌ Erreur: Aucune 2ème condition configurée !');
                }
            }
            
            // BLINDE MASTER (passif, déjà appliqué)
            else if (powerName === 'Blinde Master') {
                naAlert('✅ Pouvoir passif déjà actif !\n\n- Pas de petite blinde pour vous\n- +20k₿ de bonus déjà ajouté');
                return; // Ne pas marquer comme utilisé
            }
            
            // Marquer comme utilisé
            const myIdx = gameState.players.findIndex(p => p.name === gameState.playerName);
            gameState.players[myIdx].powerUsed = true;
            
            await saveGame();
            
            // Force refresh immédiat pour voir les changements
            setTimeout(() => loadGame(gameState.roomCode), 200);
        }

        async function placeBid(amount) {
            const myIdx = gameState.players.findIndex(p => p.name === gameState.playerName);
            if (myIdx !== gameState.currentBidder) return naAlert('Pas votre tour');
            
            // CRITICAL: Interdire d'enchérir si déjà 5 persos
            if (gameState.players[myIdx].team.length >= 5) {
                return naAlert('❌ Vous avez déjà 5 personnages ! Attendez le vote.');
            }
            
            // Vérifier si bloqué par Enchère Seal
            if (gameState.blockedPlayers && gameState.blockedPlayers.includes(gameState.playerName)) {
                return naAlert('❌ Vous êtes bloqué par Enchère Seal pour cette enchère !');
            }
            
            // IMPORTANT: Mise minimum 5000₿
            if (amount < 5000) {
                return naAlert('❌ Mise minimum : 5000₿');
            }
            
            if (amount <= gameState.currentBid) return naAlert('Trop bas');
            if (amount > gameState.players[myIdx].budget) return naAlert('Budget insuffisant');

            gameState.currentBid = amount;
            gameState.highestBidderIndex = myIdx;
            gameState.playersWhoPassed = gameState.playersWhoPassed.filter(i => i !== myIdx);

            let next = (myIdx + 1) % gameState.players.length;
            while (gameState.playersWhoPassed.includes(next) && gameState.playersWhoPassed.length < gameState.players.length - 1) {
                next = (next + 1) % gameState.players.length;
            }
            
            // IMPORTANT: Vérifier si tous les AUTRES ÉLIGIBLES ont passé
            const eligiblePlayers = gameState.players.filter((p, idx) => p.team.length < 5);
            const eligiblePassed = gameState.playersWhoPassed.filter(idx => gameState.players[idx].team.length < 5);
            const allOthersEligiblePassed = eligiblePassed.length >= eligiblePlayers.length - 1;
            
            if (allOthersEligiblePassed) {
                // J'ai gagné ! Attribuer le perso immédiatement
                const winner = gameState.players[myIdx];
                
                // CRITICAL: Ne pas ajouter si déjà 5 persos !
                if (winner.team.length < 5) {
                    winner.team.push(gameState.characters[gameState.currentCharIndex]);
                    winner.budget -= gameState.currentBid;
                }

                // Vérifier si on a fini
                const isLastChar = gameState.currentCharIndex >= gameState.characters.length - 1;
                const allHaveFive = gameState.players.every(p => p.team.length >= 5);
                
                if (allHaveFive) {
                    gameState.screen = 'vote';
                } else if (isLastChar) {
                    // Fin du deck → ROUND 2 si nécessaire
                    if (gameState.skippedCharacters && gameState.skippedCharacters.length > 0) {
                        gameState.round = (gameState.round || 1) + 1;
                        gameState.characters = [...gameState.skippedCharacters];
                        gameState.skippedCharacters = [];
                        gameState.currentCharIndex = 0;
                        gameState.currentBid = 0;
                        gameState.currentBidder = 0;
                        gameState.smallBlindPlayer = 0;
                        gameState.playersWhoPassed = [];
                        gameState.highestBidderIndex = -1;
                        gameState.blockedPlayers = [];
                        
                        const sbPlayer = gameState.players[0];
                        if (!sbPlayer.power || sbPlayer.power.name !== 'Blinde Master') {
                            sbPlayer.budget -= 10000;
                        }
                    } else {
                        gameState.screen = 'vote';
                    }
                } else {
                    const nextIdx = gameState.currentCharIndex + 1;
                    const nextSB = (gameState.smallBlindPlayer + 1) % gameState.players.length;
                    
                    const nextPlayer = gameState.players[nextSB];
                    if (!nextPlayer.power || nextPlayer.power.name !== 'Blinde Master') {
                        nextPlayer.budget -= 10000;
                    }
                    
                    gameState.currentCharIndex = nextIdx;
                    gameState.currentBid = 0;
                    gameState.currentBidder = nextSB;
                    gameState.smallBlindPlayer = nextSB;
                    gameState.playersWhoPassed = [];
                    gameState.highestBidderIndex = -1;
                    gameState.blockedPlayers = [];
                }
            } else {
                gameState.currentBidder = next;
            }

            localBidAmount = ''; // Réinitialiser l'input
            await saveGame();
            
            // Force un update immédiat
            setTimeout(() => loadGame(gameState.roomCode), 500);
        }

        async function passBid() {
            const myIdx = gameState.players.findIndex(p => p.name === gameState.playerName);
            if (myIdx !== gameState.currentBidder) return;
            
            gameState.playersWhoPassed.push(myIdx);

            // CRITICAL: Compter SEULEMENT les joueurs éligibles (pas 5 persos)
            const eligiblePlayers = gameState.players.filter((p, idx) => p.team.length < 5);
            const eligiblePassed = gameState.playersWhoPassed.filter(idx => gameState.players[idx].team.length < 5);
            
            // Si un SEUL joueur a besoin → lui donner automatiquement
            if (eligiblePlayers.length === 1) {
                const luckyPlayer = eligiblePlayers[0];
                luckyPlayer.team.push(gameState.characters[gameState.currentCharIndex]);
                
                // Décrémenter Concept Seal
                if (gameState.powerEffects) {
                    gameState.powerEffects.forEach(e => {
                        if (e.power === 'Concept Seal' && e.turnsLeft > 0) e.turnsLeft--;
                    });
                }
                
                if (gameState.players.every(p => p.team.length >= 5)) {
                    gameState.screen = 'vote';
                } else {
                    const isLast = gameState.currentCharIndex >= gameState.characters.length - 1;
                    if (isLast && gameState.skippedCharacters && gameState.skippedCharacters.length > 0) {
                        gameState.round++;
                        gameState.characters = [...gameState.skippedCharacters];
                        gameState.skippedCharacters = [];
                        gameState.currentCharIndex = 0;
                        gameState.currentBid = 0;
                        gameState.currentBidder = 0;
                        gameState.smallBlindPlayer = 0;
                        gameState.playersWhoPassed = [];
                        gameState.highestBidderIndex = -1;
                        gameState.blockedPlayers = [];
                    } else if (isLast) {
                        gameState.screen = 'vote';
                    } else {
                        gameState.currentCharIndex++;
                        gameState.currentBid = 0;
                        gameState.currentBidder = 0;
                        gameState.smallBlindPlayer = 0;
                        gameState.playersWhoPassed = [];
                        gameState.highestBidderIndex = -1;
                        gameState.blockedPlayers = [];
                    }
                }
                
                await saveGame();
                setTimeout(() => loadGame(gameState.roomCode), 200);
                return;
            }
            
            const allEligiblePassed = eligiblePassed.length >= eligiblePlayers.length;
            const onlyBidderLeft = eligiblePassed.length >= eligiblePlayers.length - 1 && gameState.highestBidderIndex >= 0;

            if (allEligiblePassed || onlyBidderLeft) {
                // Terminer l'enchère
                
                if (gameState.highestBidderIndex >= 0) {
                    // Quelqu'un avait misé → il gagne
                    const winner = gameState.players[gameState.highestBidderIndex];
                    
                    // CRITICAL: Ne pas ajouter si déjà 5 persos !
                    if (winner.team.length < 5) {
                        winner.team.push(gameState.characters[gameState.currentCharIndex]);
                        winner.budget -= gameState.currentBid;
                    }
                } else {
                    // PERSONNE n'a misé → SKIP le personnage (le mettre de côté)
                    const skippedChar = gameState.characters[gameState.currentCharIndex];
                    if (!gameState.skippedCharacters) gameState.skippedCharacters = [];
                    gameState.skippedCharacters.push(skippedChar);
                    _log(`Personnage skippé: ${skippedChar}`);
                }
                
                // Décrémenter Concept Seal à chaque nouvelle enchère
                if (gameState.powerEffects) {
                    gameState.powerEffects.forEach(e => {
                        if (e.power === 'Concept Seal' && e.turnsLeft > 0) e.turnsLeft--;
                    });
                }

                // Vérifier si on a fini le deck
                const isLastChar = gameState.currentCharIndex >= gameState.characters.length - 1;
                const allHaveFive = gameState.players.every(p => p.team.length >= 5);
                
                if (allHaveFive) {
                    // Tous ont 5 persos → VOTE
                    gameState.screen = 'vote';
                } else if (isLastChar) {
                    // Fin du deck mais pas tous ont 5 persos → ROUND 2
                    if (gameState.skippedCharacters && gameState.skippedCharacters.length > 0) {
                        gameState.round = (gameState.round || 1) + 1;
                        gameState.characters = [...gameState.skippedCharacters];
                        gameState.skippedCharacters = [];
                        gameState.currentCharIndex = 0;
                        gameState.currentBid = 0;
                        gameState.currentBidder = 0;
                        gameState.smallBlindPlayer = 0;
                        gameState.playersWhoPassed = [];
                        gameState.highestBidderIndex = -1;
                        gameState.blockedPlayers = [];
                        
                        // Petite blinde
                        const sbPlayer = gameState.players[0];
                        if (!sbPlayer.power || sbPlayer.power.name !== 'Blinde Master') {
                            sbPlayer.budget -= 10000;
                        }
                        
                        await checkAndSkipFullPlayers();
                    } else {
                        // Plus de persos skippés → VOTE (même si pas tous ont 5)
                        gameState.screen = 'vote';
                    }
                } else {
                    // Prochain personnage
                    const nextIdx = gameState.currentCharIndex + 1;
                    const nextSB = (gameState.smallBlindPlayer + 1) % gameState.players.length;
                    
                    const nextPlayer = gameState.players[nextSB];
                    if (!nextPlayer.power || nextPlayer.power.name !== 'Blinde Master') {
                        nextPlayer.budget -= 10000;
                    }
                    
                    gameState.currentCharIndex = nextIdx;
                    gameState.currentBid = 0;
                    gameState.currentBidder = nextSB;
                    gameState.smallBlindPlayer = nextSB;
                    gameState.playersWhoPassed = [];
                    gameState.highestBidderIndex = -1;
                    gameState.blockedPlayers = [];
                    
                    // AUTO-SKIP les joueurs avec 5 persos
                    await checkAndSkipFullPlayers();
                }
            } else {
                // Pas encore tous passés → trouver le prochain joueur ELIGIBLE (pas 5 persos et pas passé)
                let next = (myIdx + 1) % gameState.players.length;
                let attempts = 0;
                while (attempts < gameState.players.length) {
                    const nextPlayer = gameState.players[next];
                    // Éligible si : pas 5 persos ET pas passé
                    if (nextPlayer.team.length < 5 && !gameState.playersWhoPassed.includes(next)) {
                        break; // Trouvé !
                    }
                    next = (next + 1) % gameState.players.length;
                    attempts++;
                }
                
                // Safety check
                if (attempts >= gameState.players.length) {
                    _error('Bug détecté: tous ont passé mais allPassed était false!');
                    if (gameState.highestBidderIndex >= 0 && gameState.players[gameState.highestBidderIndex].team.length < 5) {
                        const winner = gameState.players[gameState.highestBidderIndex];
                        winner.team.push(gameState.characters[gameState.currentCharIndex]);
                        winner.budget -= gameState.currentBid;
                    }
                    
                    if (gameState.players.every(p => p.team.length >= 5)) {
                        gameState.screen = 'vote';
                    } else {
                        const nextIdx = gameState.currentCharIndex + 1;
                        const nextSB = (gameState.smallBlindPlayer + 1) % gameState.players.length;
                        const nextPlayer = gameState.players[nextSB];
                        if (!nextPlayer.power || nextPlayer.power.name !== 'Blinde Master') {
                            nextPlayer.budget -= 10000;
                        }
                        gameState.currentCharIndex = nextIdx;
                        gameState.currentBid = 0;
                        gameState.currentBidder = nextSB;
                        gameState.smallBlindPlayer = nextSB;
                        gameState.playersWhoPassed = [];
                        gameState.highestBidderIndex = -1;
                        gameState.blockedPlayers = [];
                    }
                } else {
                    gameState.currentBidder = next;
                }
                
                // AUTO-SKIP les joueurs avec 5 persos après avoir trouvé le next
                await checkAndSkipFullPlayers();
            }

            await saveGame();
            
            // Force un update immédiat
            setTimeout(() => loadGame(gameState.roomCode), 200);
        }

        // Fonction pour auto-skip les joueurs avec 5 persos
        async function checkAndSkipFullPlayers() {
            const currentPlayer = gameState.players[gameState.currentBidder];
            if (currentPlayer && currentPlayer.team.length >= 5) {
                // Ce joueur a déjà 5 persos, le skip automatiquement
                if (!gameState.playersWhoPassed.includes(gameState.currentBidder)) {
                    gameState.playersWhoPassed.push(gameState.currentBidder);
                }
                
                // Trouver le prochain joueur ELIGIBLE
                let next = (gameState.currentBidder + 1) % gameState.players.length;
                let attempts = 0;
                while (attempts < gameState.players.length) {
                    const nextPlayer = gameState.players[next];
                    // Eligible si: pas 5 persos ET pas passé
                    if (nextPlayer.team.length < 5 && !gameState.playersWhoPassed.includes(next)) {
                        break;
                    }
                    next = (next + 1) % gameState.players.length;
                    attempts++;
                }
                
                if (attempts < gameState.players.length) {
                    gameState.currentBidder = next;
                    await saveGame();
                    // Récursif: vérifier si le nouveau joueur aussi a 5 persos
                    await checkAndSkipFullPlayers();
                }
            }
        }
        
        // Fonction pour mettre à jour les Concept Seal (décrémenter tours)
        async function voteCondition(conditionNumber, playerName) {
            if (!gameState.votes[gameState.playerName]) {
                gameState.votes[gameState.playerName] = {};
            }
            gameState.votes[gameState.playerName][`condition${conditionNumber}`] = playerName;
            await saveGame();
            render();
        }

        async function showResults() {
            if (!gameState.isHost) return;
            gameState.screen = 'results';
            await saveGame();
        }

        function calculateResults() {
            const scores = {};
            gameState.players.forEach(p => scores[p.name] = 0);
            
            // Compter les votes pour condition 1
            Object.values(gameState.votes).forEach(vote => {
                if (vote.condition1) {
                    scores[vote.condition1] = (scores[vote.condition1] || 0) + 1;
                }
            });
            
            // Compter les votes pour condition 2 (si elle existe)
            const hasSecondCondition = gameState.players.some(p => p.power?.name === 'Secret Terms' && p.secretCondition);
            if (hasSecondCondition) {
                Object.values(gameState.votes).forEach(vote => {
                    if (vote.condition2) {
                        scores[vote.condition2] = (scores[vote.condition2] || 0) + 1;
                    }
                });
            }
            
            return Object.entries(scores).sort((a,b) => b[1]-a[1]).map(([n,s]) => ({name:n, score:s}));
        }

        window.openTestMode = function() {
            // Mot de passe anti-triche
            const pwd = prompt('🔒 Mode TEST\n\nEntrez le mot de passe :');
            if (pwd === null) return; // Annulé
            if (pwd !== 'UchiwaClaude') {
                naAlert('❌ Mot de passe incorrect.');
                return;
            }
            // Utiliser toutes les cartes du jeu (pas seulement celles du deck restant)
            const allGameCards = ARENA_CARDS.techniques || [];
            if (!allGameCards || allGameCards.length === 0) { naAlert('Pas de cartes'); return; }
            // Dédupliquer par nom pour n'afficher chaque carte qu'une fois
            const seen = new Set();
            const deck = allGameCards.filter(c => { if (seen.has(c.name)) return false; seen.add(c.name); return true; });

            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:10000;overflow-y:auto;padding:40px';

            const container = document.createElement('div');
            container.style.cssText = 'max-width:1400px;margin:0 auto;background:#1e293b;padding:30px;border-radius:20px;border:3px solid #ff6b00';

            const title = document.createElement('h2');
            title.textContent = 'MODE TEST - ' + deck.length + ' CARTES DISPONIBLES';
            title.style.cssText = 'color:#ff6b00;text-align:center;margin-bottom:20px;font-size:36px;text-shadow:0 0 10px #ff6b00';

            const closeBtn = document.createElement('button');
            closeBtn.textContent = 'FERMER';
            closeBtn.style.cssText = 'background:#ef4444;color:white;padding:12px 40px;border:none;border-radius:8px;cursor:pointer;font-size:18px;font-weight:bold;display:block;margin:0 auto 20px';
            closeBtn.onclick = function() { overlay.remove(); };

            const grid = document.createElement('div');
            grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px';

            const grouped = {};
            deck.forEach(card => {
                const type = card.type || 'undefined';
                if (!grouped[type]) grouped[type] = [];
                grouped[type].push(card);
            });

            const typeOrder = ['offensive', 'defensive', 'special', 'support'];
            const allTypes = Object.keys(grouped).sort((a, b) => {
                const aIdx = typeOrder.indexOf(a);
                const bIdx = typeOrder.indexOf(b);
                if (aIdx === -1 && bIdx === -1) return a.localeCompare(b);
                if (aIdx === -1) return 1;
                if (bIdx === -1) return -1;
                return aIdx - bIdx;
            });

            allTypes.forEach(type => {
                const categoryTitle = document.createElement('h3');
                categoryTitle.textContent = type.toUpperCase() + ' (' + grouped[type].length + ' cartes)';
                categoryTitle.style.cssText = 'color:#06b6d4;grid-column:1/-1;margin-top:20px;font-size:28px;border-bottom:2px solid #06b6d4;padding-bottom:10px';
                grid.appendChild(categoryTitle);

                grouped[type].forEach(card => {
                    const cardBtn = document.createElement('button');
                    cardBtn.style.cssText = 'background:linear-gradient(135deg,#1e3a8a,#3730a3);color:white;padding:20px;border:2px solid #06b6d4;border-radius:12px;cursor:pointer;text-align:left;transition:all 0.2s';
                    cardBtn.onmouseover = function() { this.style.transform = 'scale(1.05)'; this.style.borderColor = '#fbbf24'; };
                    cardBtn.onmouseout = function() { this.style.transform = 'scale(1)'; this.style.borderColor = '#06b6d4'; };

                    const cardName = document.createElement('div');
                    cardName.textContent = card.name;
                    cardName.style.cssText = 'font-weight:bold;font-size:18px;margin-bottom:10px;color:#fbbf24';

                    const details = document.createElement('div');
                    const elementColors = { katon: '#ff6b00', suiton: '#0ea5e9', raiton: '#fbbf24', futon: '#10b981', doton: '#a16207' };
                    const elementColor = elementColors[card.element] || '#9ca3af';

                    let detailsHTML = '';
                    if (card.element) detailsHTML += '<div style="color:' + elementColor + ';font-weight:bold;margin-bottom:6px">Element: ' + card.element.toUpperCase() + '</div>';
                    if (card.damage) detailsHTML += '<div style="color:#cbd5e1;margin-bottom:4px">Degats: ' + card.damage + '</div>';
                    if (card.target) detailsHTML += '<div style="color:#cbd5e1;margin-bottom:4px">Cible: ' + card.target + '</div>';
                    detailsHTML += '<div style="color:#cbd5e1">Type: ' + type + '</div>';

                    details.innerHTML = detailsHTML;
                    details.style.fontSize = '14px';

                    cardBtn.appendChild(cardName);
                    cardBtn.appendChild(details);
                    cardBtn.onclick = function() { window.addCardToHand(card); overlay.remove(); };
                    grid.appendChild(cardBtn);
                });
            });

            container.appendChild(title);
            container.appendChild(closeBtn);
            container.appendChild(grid);
            overlay.appendChild(container);

        function playTurnSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                // Son style "alerte ninja" : deux notes courtes montantes
                const notes = [
                    { freq: 440, start: 0,    dur: 0.08 },
                    { freq: 660, start: 0.10, dur: 0.08 },
                    { freq: 880, start: 0.20, dur: 0.12 },
                ];
                notes.forEach(({ freq, start, dur }) => {
                    const osc  = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
                    gain.gain.setValueAtTime(0, ctx.currentTime + start);
                    gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + start + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
                    osc.start(ctx.currentTime + start);
                    osc.stop(ctx.currentTime + start + dur + 0.05);
                });
            } catch(e) {
                _warn('[SOUND] Web Audio non supporté', e);
            }
        }
